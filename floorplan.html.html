<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>CLUBPRO V56 - Live Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #020617; color: white; margin: 0; overflow: auto; font-family: 'Inter', sans-serif; }
        #wrapper { min-width: 450px; display: flex; justify-content: center; padding: 20px 0; }
        .map-container { 
            position: relative; 
            width: 420px; 
            height: 750px; 
            background: #0f172a; /* רקע כהה נקי */
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .t-btn { 
            position: absolute; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            font-weight: 900; 
            transition: all 0.2s; 
            transform: translate(-50%, -50%); 
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        /* הגדרות צורה לפי סוג שולחן */
        .type-std { width: 48px; height: 40px; border-radius: 6px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .type-std-v { width: 42px; height: 75px; border-radius: 6px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .type-vip-main { width: 110px; height: 65px; border-radius: 10px; border: 2px solid #f59e0b; background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .type-vip-rect { width: 45px; height: 65px; border-radius: 6px; border: 1px solid #f59e0b; color: #f59e0b; }
        .type-round { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #f59e0b; color: #f59e0b; }
        .type-bar-rect { width: 160px; height: 50px; border-radius: 10px; background: rgba(13, 148, 136, 0.1) !important; border: 1px solid #0d9488; color: #0d9488; }
        .type-bar-seat { width: 18px; height: 18px; border-radius: 50%; font-size: 7px; background: #334155; }
        .type-dj { width: 60px; height: 60px; border-radius: 12px; border: 2px solid #3b82f6; color: #3b82f6; }

        .status-taken { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>

    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="window.location.href='index.html'" class="bg-slate-900 p-3 rounded-2xl border border-white/10 text-amber-500 shadow-2xl"><i data-lucide="home"></i></button>
        <div class="bg-slate-900/90 px-4 py-2 rounded-2xl border border-white/10 text-[10px] font-black flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> מפת שולחנות
        </div>
    </div>

    <div id="wrapper">
        <div class="map-container">
            <div class="t-btn type-dj" style="top: 36%; left: 86%;">DJ</div>
            
            <div class="t-btn type-bar-rect" style="top: 44.5%; left: 45%;" onclick="book('BAR')">BAR</div>

            <div class="t-btn type-std-v" style="top: 53%; left: 85.5%;" onclick="book('T1')">T1</div>
            <div class="t-btn type-std-v" style="top: 66.5%; left: 85.5%;" onclick="book('T2')">T2</div>
            <div class="t-btn type-std-v" style="top: 80%; left: 85.5%;" onclick="book('T3')">T3</div>

            <div class="t-btn type-std" style="top: 55%; left: 60.5%;" onclick="book('T4')">T4</div>
            <div class="t-btn type-std" style="top: 65%; left: 60.5%;" onclick="book('T5')">T5</div>
            <div class="t-btn type-std" style="top: 75%; left: 60.5%;" onclick="book('T6')">T6</div>

            <div class="t-btn type-vip-main" style="top: 23%; left: 75.5%;" onclick="book('T7')">T7 VIP</div>

            <div class="t-btn type-std" style="top: 21.5%; left: 16.5%;" onclick="book('T11')">T11</div>
            <div class="t-btn type-std" style="top: 21.5%; left: 27.5%;" onclick="book('T10')">T10</div>
            <div class="t-btn type-std" style="top: 21.5%; left: 38.5%;" onclick="book('T9')">T9</div>
            <div class="t-btn type-std" style="top: 21.5%; left: 49.5%;" onclick="book('T8')">T8</div>

            <div class="t-btn type-round" style="top: 36.8%; left: 7.5%;" onclick="book('V13')">V13</div>
            <div class="t-btn type-round" style="top: 54.8%; left: 7.5%;" onclick="book('V14')">V14</div>
            <div class="t-btn type-round" style="top: 72.8%; left: 7.5%;" onclick="book('V15')">V15</div>

            <div class="t-btn type-vip-rect" style="top: 55.5%; left: 26.8%;" onclick="book('T15')">T15</div>
            <div class="t-btn type-vip-rect" style="top: 70.5%; left: 26.8%;" onclick="book('T18')">T18</div>

            <div class="t-btn type-bar-seat" style="top: 46%; left: 26%;" onclick="book('S1')">S1</div>
            <div class="t-btn type-bar-seat" style="top: 42.5%; left: 26%;" onclick="book('S2')">S2</div>
            <div class="t-btn type-bar-seat" style="top: 39%; left: 30%;" onclick="book('S3')">S3</div>
            <div class="t-btn type-bar-seat" style="top: 39%; left: 34%;" onclick="book('S4')">S4</div>
            <div class="t-btn type-bar-seat" style="top: 39%; left: 38%;" onclick="book('S5')">S5</div>
            <div class="t-btn type-bar-seat" style="top: 39%; left: 42%;" onclick="book('S6')">S6</div>
            <div class="t-btn type-bar-seat" style="top: 41.5%; left: 64%;" onclick="book('S10_R')">S10</div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 hidden z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs p-8 rounded-[3rem] shadow-2xl">
            <h3 class="text-amber-500 font-black text-center uppercase tracking-widest text-xs mb-8" id="m-title">הזמנה</h3>
            <div class="space-y-4">
                <input id="in-name" placeholder="שם הלקוח" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none font-bold text-white text-sm">
                <input id="in-pax" type="number" placeholder="כמות אנשים" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-center font-black text-white text-sm">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeM()" class="flex-1 text-slate-500 font-bold uppercase text-[10px]">ביטול</button>
                    <button onclick="save()" class="flex-[2] bg-amber-500 text-black py-4 rounded-2xl font-black uppercase text-xs">שמור</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        const urlParams = new URLSearchParams(window.location.search);
        const assignToId = urlParams.get('assignTo');
        
        let curT = null;
        const today = new Date().toISOString().split('T')[0];

        db.collection('reservations').where('eventDate', '==', today).where('status', '==', 'active')
          .onSnapshot(snap => {
            const taken = snap.docs.map(d => d.data().tableNumber);
            document.querySelectorAll('.t-btn').forEach(btn => {
                const id = btn.innerText.split(' ')[0];
                if (taken.includes(id)) btn.classList.add('status-taken');
                else btn.classList.remove('status-taken');
            });
          });

        async function book(id) {
            const cleanId = id.split('_')[0];
            if (assignToId) {
                await db.collection('reservations').doc(assignToId).update({ tableNumber: cleanId });
                window.location.href = 'index.html';
            } else {
                curT = cleanId;
                document.getElementById('m-title').innerText = 'שולחן ' + curT;
                document.getElementById('modal').classList.remove('hidden');
            }
        }

        function closeM() { document.getElementById('modal').classList.add('hidden'); }
        async function save() {
            const name = document.getElementById('in-name').value;
            const pax = document.getElementById('in-pax').value;
            if(!name || !pax) return alert("מלא פרטים");
            await db.collection('reservations').add({
                name, pax: Number(pax), tableNumber: curT, 
                eventDate: today, status: 'active', arrived: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeM();
        }
        lucide.createIcons();
    </script>
</body>
</html>
