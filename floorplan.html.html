<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro | Digital Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .venue-grid { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            grid-template-rows: repeat(15, 50px); 
            gap: 8px; 
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .table-obj {
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-weight: 900; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-free { background: rgba(30, 41, 59, 0.7); color: #94a3b8; }
        .status-taken { background: #ef4444; color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); border-color: #ef4444; }
        .label-area { grid-column: span 10; text-align: center; color: #f59e0b; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; padding: 10px 0; }
        .bar-area { background: #1e293b; border-radius: 20px; border: 2px solid #334155; }
        .dj-area { background: #3b82f6; color: white; }
        .vip-gold { border: 1px solid #f59e0b; color: #f59e0b; }
    </style>
</head>
<body>

    <div class="p-6 flex justify-between items-center bg-slate-900/50 sticky top-0 z-50 backdrop-blur-md">
        <h1 class="text-xl font-black italic text-amber-500">CLUBPRO <span class="text-white text-xs not-italic font-light ml-2">MAP v47</span></h1>
        <button onclick="location.href='index.html'" class="bg-slate-800 p-2 rounded-lg border border-white/10"><i data-lucide="home" size="20"></i></button>
    </div>

    <div class="venue-grid">
        
        <div class="label-area">VIP ZONE</div>
        <div onclick="book('T11')" id="T11" class="table-obj status-free grid-column-span-2" style="grid-column: 1/3; grid-row: 2;">T11</div>
        <div onclick="book('T10')" id="T10" class="table-obj status-free" style="grid-column: 3/5; grid-row: 2;">T10</div>
        <div onclick="book('T9')" id="T9" class="table-obj status-free" style="grid-column: 5/7; grid-row: 2;">T9</div>
        <div onclick="book('T8')" id="T8" class="table-obj status-free" style="grid-column: 7/9; grid-row: 2;">T8</div>
        
        <div onclick="book('T7')" id="T7" class="table-obj status-free vip-gold" style="grid-column: 1/7; grid-row: 3/5;">T7 VIP MASTER</div>
        <div class="table-obj dj-area" style="grid-column: 8/11; grid-row: 3/5;">DJ</div>

        <div class="label-area" style="margin-top:20px">CENTRAL BAR</div>
        <div class="bar-area flex items-center justify-center font-black text-slate-500" style="grid-column: 2/10; grid-row: 6/8;">BAR</div>
        <div onclick="book('S1')" id="S1" class="table-obj status-free rounded-full" style="grid-column: 2; grid-row: 8; height: 30px; width:30px">S1</div>
        <div onclick="book('S2')" id="S2" class="table-obj status-free rounded-full" style="grid-column: 3; grid-row: 8; height: 30px; width:30px">S2</div>
        <div onclick="book('S3')" id="S3" class="table-obj status-free rounded-full" style="grid-column: 4; grid-row: 8; height: 30px; width:30px">S3</div>
        <div onclick="book('S4')" id="S4" class="table-obj status-free rounded-full" style="grid-column: 5; grid-row: 8; height: 30px; width:30px">S4</div>
        <div onclick="book('S5')" id="S5" class="table-obj status-free rounded-full" style="grid-column: 6; grid-row: 8; height: 30px; width:30px">S5</div>

        <div class="label-area" style="margin-top:20px">TABLES AREA</div>
        
        <div onclick="book('T1')" id="T1" class="table-obj status-free" style="grid-column: 9/11; grid-row: 10/12;">T1</div>
        <div onclick="book('T2')" id="T2" class="table-obj status-free" style="grid-column: 9/11; grid-row: 12/14;">T2</div>
        <div onclick="book('T3')" id="T3" class="table-obj status-free" style="grid-column: 9/11; grid-row: 14/16;">T3</div>

        <div onclick="book('T4')" id="T4" class="table-obj status-free" style="grid-column: 6/8; grid-row: 10/11;">T4</div>
        <div onclick="book('T5')" id="T5" class="table-obj status-free" style="grid-column: 6/8; grid-row: 12/13;">T5</div>
        <div onclick="book('T6')" id="T6" class="table-obj status-free" style="grid-column: 6/8; grid-row: 14/15;">T6</div>

        <div onclick="book('T15')" id="T15" class="table-obj status-free vip-gold" style="grid-column: 1/3; grid-row: 10/12;">T15 VIP</div>
        <div onclick="book('T18')" id="T18" class="table-obj status-free" style="grid-column: 1/3; grid-row: 13/15;">T18</div>
    </div>

    <div id="modal" class="fixed inset-0 hidden z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs p-8 rounded-[2rem] shadow-2xl">
            <h3 class="text-amber-500 font-black text-center uppercase mb-6" id="m-title">הזמנה</h3>
            <div class="space-y-4">
                <input id="in-name" placeholder="שם לקוח" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none font-bold">
                <input id="in-pax" type="number" placeholder="כמות" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none text-center font-black">
                <button onclick="save()" class="w-full bg-amber-500 text-black py-4 rounded-xl font-black uppercase">אשר הזמנה</button>
                <button onclick="closeM()" class="w-full text-slate-500 font-bold text-xs uppercase">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let curT = null;
        const today = new Date().toISOString().split('T')[0];

        db.collection('reservations').where('eventDate', '==', today).where('status','==','active')
          .onSnapshot(snap => {
            document.querySelectorAll('.table-obj').forEach(el => el.classList.replace('status-taken', 'status-free'));
            snap.docs.forEach(doc => {
                const tableId = doc.data().tableNumber;
                const el = document.getElementById(tableId);
                if (el) el.classList.replace('status-free', 'status-taken');
            });
          });

        function book(id) {
            curT = id;
            document.getElementById('m-title').innerText = 'הזמנת שולחן ' + id;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeM() { document.getElementById('modal').classList.add('hidden'); }
        async function save() {
            const name = document.getElementById('in-name').value;
            const pax = document.getElementById('in-pax').value;
            if(!name || !pax) return alert("מלא פרטים");
            await db.collection('reservations').add({
                name, pax: Number(pax), tableNumber: curT, eventDate: today, 
                status: 'active', arrived: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeM();
        }
        lucide.createIcons();
    </script>
</body>
</html>
