    <style>
        body { background: #020617; color: white; margin: 0; overflow: auto; font-family: sans-serif; display: flex; justify-content: center; }
        .map-container { 
            position: relative; 
            width: 500px; /* לפי הנתונים שלך */
            height: 850px; 
            background-image: url('map.png'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            margin-top: 20px;
        }
        .t-btn { 
            position: absolute; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            transition: all 0.2s; 
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        /* עיבוד נתוני השולחנות שלך לסטייל */
        .status-free { background: rgba(34, 197, 94, 0.45); border-color: #22c55e; }
        .status-taken { background: rgba(220, 38, 38, 0.85); border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.6); }
        .dj-box { border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.4); border-radius: 8px; }
    </style>
</head>
<body>

        <div class="bg-slate-900/90 px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> מפה חיה
        </div>
    </div>

        <div class="t-btn dj-box" style="left: 395px; top: 260px; width: 60px; height: 85px;">DJ</div>

        <div class="t-btn status-free" style="left: 65px; top: 158px; width: 38px; height: 42px;" onclick="book('T11')">T11</div>
        <div class="t-btn status-free" style="left: 118px; top: 158px; width: 38px; height: 42px;" onclick="book('T10')">T10</div>
        <div class="t-btn status-free" style="left: 172px; top: 158px; width: 38px; height: 42px;" onclick="book('T9')">T9</div>
        <div class="t-btn status-free" style="left: 226px; top: 158px; width: 38px; height: 42px;" onclick="book('T8')">T8</div>

        <div class="t-btn status-free" style="left: 275px; top: 430px; width: 42px; height: 62px;" onclick="book('T4')">T4</div>
        <div class="t-btn status-free" style="left: 275px; top: 508px; width: 42px; height: 62px;" onclick="book('T5')">T5</div>
        <div class="t-btn status-free" style="left: 275px; top: 588px; width: 42px; height: 62px;" onclick="book('T6')">T6</div>

        <div class="t-btn status-free" style="left: 25px; top: 298px; width: 45px; height: 45px; border-radius: 50%;" onclick="book('T12')">T12</div>

        <div class="t-btn status-free" style="left: 122px; top: 338px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S2_L')">S2</div>
        <div class="t-btn status-free" style="left: 140px; top: 315px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S2')">S2</div>
        <div class="t-btn status-free" style="left: 158px; top: 315px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S3')">S3</div>

        <div class="t-btn status-free" style="left: 238px; top: 315px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S7')">S7</div>
        <div class="t-btn status-free" style="left: 258px; top: 315px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S9')">S9</div>
        <div class="t-btn status-free" style="left: 278px; top: 315px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S10')">S10</div>
        <div class="t-btn status-free" style="left: 315px; top: 338px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S10_R')">S10</div>
        <div class="t-btn status-free" style="left: 315px; top: 362px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S9_R')">S9</div>
        <div class="t-btn status-free" style="left: 315px; top: 385px; width: 18px; height: 18px; border-radius: 50%; font-size: 7px;" onclick="book('S8')">S8</div>
    </div>

    <div id="modal" class="fixed inset-0 hidden z-[100] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs p-6 rounded-[2.5rem] shadow-2xl space-y-4">
            <h3 class="text-amber-500 font-black text-center uppercase tracking-widest text-xs" id="m-title">הזמנה</h3>
            <input id="in-name" placeholder="שם לקוח" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none font-bold text-white text-sm">
            <input id="in-phone" placeholder="טלפון" type="tel" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none text-left text-white text-sm" dir="ltr">
            <input id="in-pax" type="number" placeholder="כמות" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none text-center font-black text-white text-sm">
            <div class="flex gap-2 pt-2">
                <button onclick="closeM()" class="flex-1 text-slate-500 font-bold uppercase text-[10px]">ביטול</button>
                <button onclick="save()" class="flex-[2] bg-amber-500 text-black py-3 rounded-xl font-black uppercase text-xs">שמור</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let curT = null;
        const today = new Date().toISOString().split('T')[0];

        db.collection('reservations').where('eventDate', '==', today).where('status','==','active')
          .onSnapshot(snap => {
            const taken = snap.docs.map(d => d.data().tableNumber);
            document.querySelectorAll('.t-btn').forEach(btn => {
                const id = btn.innerText.split(' ')[0];
                if (taken.includes(id)) {
                    btn.classList.replace('status-free', 'status-taken');
                } else {
                    btn.classList.replace('status-taken', 'status-free');
                }
            });
          });

        function book(id) {
            curT = id.split('_')[0];
            document.getElementById('m-title').innerText = 'שולחן ' + curT;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeM() { document.getElementById('modal').classList.add('hidden'); }
        async function save() {
            const name = document.getElementById('in-name').value;
            const pax = document.getElementById('in-pax').value;
            if(!name || !pax) return alert("מלא פרטים");
            await db.collection('reservations').add({
                name, pax: Number(pax), phone: document.getElementById('in-phone').value,
                tableNumber: curT, eventDate: today, status: 'active',
                arrived: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                promoterName: 'מפה חיה'
            });
            closeM();
        }
        lucide.createIcons();
    </script>
</body>
</html>
