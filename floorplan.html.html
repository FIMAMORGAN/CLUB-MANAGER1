        .bar-main { background: #0f172a; border: 2px solid #334155; border-radius: 8px; color: #334155; font-size: 12px; }

    <div id="modal" class="fixed inset-0 hidden z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs p-6 rounded-[2rem]">
            <h3 class="text-amber-500 font-black text-center mb-6" id="m-title">הזמנה</h3>
            <div class="space-y-4">
                <input id="in-name" placeholder="שם לקוח" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white font-bold outline-none">
                <input id="in-pax" type="number" placeholder="כמות" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white text-center font-black outline-none">
                <button onclick="save()" class="w-full bg-amber-500 text-black py-4 rounded-xl font-black uppercase">שמור</button>
                <button onclick="closeM()" class="w-full text-slate-500 font-bold text-xs uppercase">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let curT = null;
        const today = new Date().toISOString().split('T')[0];

        db.collection('reservations').where('eventDate', '==', today).where('status','==','active')
          .onSnapshot(snap => {
            document.querySelectorAll('.obj').forEach(el => el.classList.replace('status-taken', 'status-free'));
            snap.docs.forEach(doc => {
                const tableId = doc.data().tableNumber;
                const el = document.getElementById(tableId);
                if (el) el.classList.replace('status-free', 'status-taken');
            });
          });

        function book(id) {
            curT = id.split('_')[0];
            document.getElementById('m-title').innerText = 'שולחן ' + curT;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeM() { document.getElementById('modal').classList.add('hidden'); }
        async function save() {
            const name = document.getElementById('in-name').value;
            const pax = document.getElementById('in-pax').value;
            if(!name || !pax) return alert("מלא פרטים");
            await db.collection('reservations').add({
                name, pax: Number(pax), tableNumber: curT, eventDate: today, 
                status: 'active', arrived: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeM();
        }
        lucide.createIcons();
    </script>
</body>
</html>
