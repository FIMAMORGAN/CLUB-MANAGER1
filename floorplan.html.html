<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro | Compact Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .map-layout { 
            position: relative; 
            width: 360px; /* רוחב מושלם לכל טלפון */
            margin: 0 auto; 
            height: 700px;
            background: #020617;
        }
        .obj {
            position: absolute;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-weight: 900; font-size: 11px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
        }
        .status-free { background: #1e293b; color: #64748b; }
        .status-taken { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .vip { border: 1.5px solid #f59e0b; color: #f59e0b; }
        .bar-main { background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #334155; font-size: 14px; }
        .dj { background: #3b82f6; color: white; border: none; }
        .label { position: absolute; font-size: 10px; font-weight: 900; color: #334155; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="p-4 flex justify-between items-center bg-slate-900 border-b border-white/5 sticky top-0 z-50">
        <h1 class="text-lg font-black italic text-amber-500">CLUBPRO <span class="text-white text-[10px] not-italic opacity-50">COMPACT</span></h1>
        <button onclick="location.href='index.html'" class="bg-slate-800 p-2 rounded-lg text-amber-500"><i data-lucide="home" size="18"></i></button>
    </div>

    <div class="map-layout">
        
        <div onclick="book('T11')" id="T11" class="obj status-free" style="top: 50px; left: 40px; width: 45px; height: 40px;">T11</div>
        <div onclick="book('T10')" id="T10" class="obj status-free" style="top: 50px; left: 95px; width: 45px; height: 40px;">T10</div>
        <div onclick="book('T9')" id="T9" class="obj status-free" style="top: 50px; left: 150px; width: 45px; height: 40px;">T9</div>
        <div onclick="book('T8')" id="T8" class="obj status-free" style="top: 50px; left: 205px; width: 45px; height: 40px;">T8</div>

        <div onclick="book('T7')" id="T7" class="obj status-free vip" style="top: 65px; left: 300px; width: 100px; height: 70px;">T7 VIP</div>

        <div class="obj dj" style="top: 170px; left: 310px; width: 70px; height: 70px;">DJ</div>

        <div class="obj bar-main" style="top: 250px; left: 160px; width: 180px; height: 60px;">בר</div>
        
        <div onclick="book('S1')" id="S1" class="obj status-free rounded-full" style="top: 250px; left: 55px; width: 22px; height: 22px;">S1</div>
        <div onclick="book('S2')" id="S2" class="obj status-free rounded-full" style="top: 220px; left: 55px; width: 22px; height: 22px;">S2</div>
        <div onclick="book('S3')" id="S3" class="obj status-free rounded-full" style="top: 210px; left: 85px; width: 22px; height: 22px;">S3</div>
        <div onclick="book('S4')" id="S4" class="obj status-free rounded-full" style="top: 210px; left: 115px; width: 22px; height: 22px;">S4</div>
        <div onclick="book('S5')" id="S5" class="obj status-free rounded-full" style="top: 210px; left: 145px; width: 22px; height: 22px;">S5</div>
        <div onclick="book('S6')" id="S6" class="obj status-free rounded-full" style="top: 210px; left: 175px; width: 22px; height: 22px;">S6</div>
        <div onclick="book('S7')" id="S7" class="obj status-free rounded-full" style="top: 210px; left: 205px; width: 22px; height: 22px;">S7</div>
        <div onclick="book('S8')" id="S8" class="obj status-free rounded-full" style="top: 290px; left: 260px; width: 22px; height: 22px;">S8</div>

        <div onclick="book('T1')" id="T1" class="obj status-free" style="top: 400px; left: 320px; width: 50px; height: 90px;">T1</div>
        <div onclick="book('T2')" id="T2" class="obj status-free" style="top: 500px; left: 320px; width: 50px; height: 90px;">T2</div>
        <div onclick="book('T3')" id="T3" class="obj status-free" style="top: 600px; left: 320px; width: 50px; height: 90px;">T3</div>

        <div onclick="book('T4')" id="T4" class="obj status-free" style="top: 400px; left: 230px; width: 50px; height: 70px;">T4</div>
        <div onclick="book('T5')" id="T5" class="obj status-free" style="top: 480px; left: 230px; width: 50px; height: 70px;">T5</div>
        <div onclick="book('T6')" id="T6" class="obj status-free" style="top: 560px; left: 230px; width: 50px; height: 70px;">T6</div>

        <div onclick="book('T12')" id="T12" class="obj status-free rounded-full" style="top: 150px; left: 40px; width: 45px; height: 45px;">T12</div>
        <div onclick="book('T15')" id="T15" class="obj status-free vip" style="top: 400px; left: 90px; width: 55px; height: 80px;">T15</div>
        <div onclick="book('T18')" id="T18" class="obj status-free" style="top: 500px; left: 90px; width: 55px; height: 80px;">T18</div>
        <div onclick="book('T14')" id="T14" class="obj status-free rounded-full" style="top: 600px; left: 40px; width: 45px; height: 45px;">T14</div>

        <div class="label" style="top: 680px; left: 50%; transform: translateX(-50%); border-bottom: 2px solid #334155; width: 100px; text-align: center;">כניסה</div>
    </div>

    <div id="modal" class="fixed inset-0 hidden z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs p-6 rounded-[2.5rem]">
            <h3 class="text-amber-500 font-black text-center mb-6" id="m-title">הזמנה</h3>
            <div class="space-y-4">
                <input id="in-name" placeholder="שם לקוח" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white font-bold outline-none">
                <input id="in-pax" type="number" placeholder="כמות" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white text-center font-black outline-none">
                <button onclick="save()" class="w-full bg-amber-500 text-black py-4 rounded-xl font-black uppercase shadow-lg shadow-amber-500/20">אשר</button>
                <button onclick="closeM()" class="w-full text-slate-500 font-bold text-xs">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let curT = null;
        const today = new Date().toISOString().split('T')[0];

        db.collection('reservations').where('eventDate', '==', today).where('status','==','active')
          .onSnapshot(snap => {
            document.querySelectorAll('.obj').forEach(el => el.classList.replace('status-taken', 'status-free'));
            snap.docs.forEach(doc => {
                const tableId = doc.data().tableNumber;
                const el = document.getElementById(tableId);
                if (el) el.classList.replace('status-free', 'status-taken');
            });
          });

        function book(id) {
            curT = id;
            document.getElementById('m-title').innerText = 'הזמנת שולחן ' + id;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeM() { document.getElementById('modal').classList.add('hidden'); }
        async function save() {
            const name = document.getElementById('in-name').value;
            const pax = document.getElementById('in-pax').value;
            if(!name || !pax) return alert("מלא פרטים");
            await db.collection('reservations').add({
                name, pax: Number(pax), tableNumber: curT, eventDate: today, 
                status: 'active', arrived: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeM();
        }
        lucide.createIcons();
    </script>
</body>
</html>
