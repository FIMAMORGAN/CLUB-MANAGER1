<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro V54 - Master Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .text-tiny { font-size: 9px !important; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: null,
            selectedDate: new Date().toISOString().split('T')[0],
            isDateConfirmed: false,
            reservations: [],
            isAdding: false
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        // לוגיקת רינדור השורה - עם הכפתור של המפה
        function renderRow(res) {
            return `
            <div class="flex items-center justify-between p-3 border-b border-white/5 ${res.arrived ? 'opacity-50' : ''}">
                <div class="flex items-center gap-3">
                    <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-5 h-5 rounded accent-green-500">
                    <div>
                        <p class="font-black text-white text-sm">${res.name} (${res.pax})</p>
                        <p class="text-tiny text-slate-400 font-bold uppercase">
                            ${res.tableNumber ? '<span class="text-amber-500">שולחן ' + res.tableNumber + '</span>' : '₪' + (res.minOrder || 0)} | ${res.promoterName || 'Admin'}
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="window.location.href='floorplan.html?assignTo=${res.id}'" class="text-blue-400 p-2 glass rounded-lg border-blue-500/20">
                        <i data-lucide="map-pin" size="18"></i>
                    </button>
                    <button onclick="window.open('https://wa.me/${res.phone.replace(/\\D/g,'')}','_blank')" class="text-green-500 p-2 glass rounded-lg border-green-500/20">
                        <i data-lucide="message-circle" size="18"></i>
                    </button>
                    <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-2 glass rounded-lg border-red-500/20">
                        <i data-lucide="trash-2" size="18"></i>
                    </button>
                </div>
            </div>`;
        }

        function render() {
            const root = document.getElementById('app');
            // אם לא מחובר - מסך כניסה
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4"><div class="glass p-10 rounded-3xl text-center"><h2 class="text-2xl font-black mb-10 text-amber-500 italic">CLUBPRO</h2><input id="l-in" placeholder="טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white font-bold outline-none"><button onclick="login(document.getElementById('l-in').value)" class="w-full btn-amber py-4 rounded-xl font-black uppercase">כניסה</button></div></div>`;
                return;
            }
            
            // מסך ראשי - רשימת הזמנות
            const venueName = state.venueId === 'shalvata' ? 'Shalvata' : 'Q-GALLERY';
            const list = state.reservations.filter(r => r.status === 'active' && r.eventDate === state.selectedDate);

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden">
                    <header class="p-4 glass flex justify-between items-center">
                        <span class="font-black italic text-amber-500">CLUBPRO</span>
                        <div class="flex gap-2">
                            <button onclick="updateState({venueId: null, isDateConfirmed: false})" class="text-tiny font-black bg-white/5 px-3 py-1 rounded-lg border border-white/10">בית</button>
                        </div>
                    </header>
                    <main class="flex-1 overflow-y-auto p-2 space-y-2">
                        <div class="glass rounded-2xl overflow-hidden divide-y divide-white/5">
                            <div class="bg-white/5 p-2 text-tiny font-black uppercase text-center text-slate-500">הזמנות להיום</div>
                            ${list.length ? list.map(r => renderRow(r)).join('') : '<p class="p-10 text-center text-slate-600 font-bold">אין הזמנות</p>'}
                        </div>
                    </main>
                    <footer class="p-4">
                        <button onclick="window.location.href='floorplan.html'" class="w-full btn-amber py-4 rounded-2xl shadow-xl font-black uppercase">פתח מפה חיה</button>
                    </footer>
                </div>`;
            lucide.createIcons();
        }

        async function login(v) {
            if(v === 'res') { updateState({role:'admin', userName:'Admin'}); localStorage.setItem('club_role','admin'); }
            else if(v.length >= 10) { updateState({role:'promoter', userName:'Yachzan', phone: v}); localStorage.setItem('club_role','promoter'); }
        }

        db.collection('reservations').onSnapshot(snap => {
            updateState({ reservations: snap.docs.map(d => ({id: d.id, ...d.data()})) });
        });
    </script>
</body>
</html>
