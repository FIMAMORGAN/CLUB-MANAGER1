<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro V84 - Time & Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; font-size: 12px; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 3px solid #f59e0b; font-size: 10px; padding: 4px 8px; color: #f59e0b; font-weight: 900; }
        .text-tiny { font-size: 9px !important; }
    </style>
</head>
<body>
    <div id="app"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const allVenues = [
            { id: 'shalvata', name: 'Shalvata', waze: 'התערוכה 3 תל אביב' },
            { id: 'q_gallery', name: 'Q-GALLERY', waze: 'רוטשילד 19 תל אביב' },
            { id: 'ruki_vverh', name: 'РУКИ ВВЕРХ', waze: 'טברסקי 14 תל אביב' }
        ];

        const getToday = () => new Date().toISOString().split('T')[0];
        const savedDate = localStorage.getItem('last_date');
        const urlParams = new URLSearchParams(window.location.search);
        const confirmed = urlParams.get('confirmed');

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: confirmed ? 'q_gallery' : (localStorage.getItem('last_venue') || null),
            selectedDate: (confirmed && savedDate) ? savedDate : (savedDate || getToday()),
            isDateConfirmed: !!confirmed || false,
            reservations: [], users: [], isAdding: false, editingId: null,
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, time: '22:30', notes: '' }
        };

        function updateState(newData) { 
            state = { ...state, ...newData }; 
            if (state.selectedDate) localStorage.setItem('last_date', state.selectedDate);
            if (state.venueId) localStorage.setItem('last_venue', state.venueId);
            render(); 
        }

        async function login(val) {
            const clean = val.trim();
            if (clean.toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                localStorage.setItem('club_phone', 'ADMIN');
                return;
            }
            if (clean.length >= 10) {
                const userDoc = await db.collection('users').doc(clean).get();
                let name = userDoc.exists ? userDoc.data().name : prompt("שם יחצן חדש:");
                if (!name) return;
                if (!userDoc.exists) await db.collection('users').doc(clean).set({ name, phone: clean });
                updateState({ role: 'promoter', userName: name, phone: clean });
                localStorage.setItem('club_role', 'promoter');
                localStorage.setItem('club_name', name);
                localStorage.setItem('club_phone', clean);
            }
        }

        function renderRow(res) {
            return `
            <div class="flex items-center justify-between p-2 border-b border-white/5 ${res.arrived ? 'opacity-50' : ''}">
                <div class="flex items-center gap-2 flex-1">
                    <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-5 h-5 rounded accent-green-500">
                    <div class="overflow-hidden">
                        <p class="font-black text-white leading-tight truncate">${res.name} (${res.pax}) <span class="text-blue-400 text-[10px]">${res.time || ''}</span></p>
                        <p class="text-tiny font-bold uppercase truncate">
                            ${res.tableNumber ? `<span class="text-amber-500">שולחן ${res.tableNumber}</span> | ` : ''} ₪${res.minOrder} | ${res.promoterName || 'Admin'}
                        </p>
                        ${res.notes ? `<p class="text-[9px] text-slate-400 italic font-bold">💬 ${res.notes}</p>` : ''}
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    ${state.venueId === 'q_gallery' ? `<button onclick="window.location.href='floorplan.html?assignTo=${res.id}&date=${state.selectedDate}'" class="text-blue-400 p-1.5"><i data-lucide="map-pin" size="18"></i></button>` : ''}
                    <button onclick="sendWhatsAppToClient('${res.id}')" class="text-green-500 p-1.5"><i data-lucide="message-circle" size="18"></i></button>
                    <button onclick="editReservation('${res.id}')" class="text-amber-500 p-1"><i data-lucide="edit-2" size="18"></i></button>
                </div>
            </div>`;
        }

        function editReservation(id) {
            const res = state.reservations.find(r => r.id === id);
            updateState({ 
                editingId: id, 
                isAdding: true, 
                formData: { 
                    type: res.type, pax: res.pax, clientName: res.name, 
                    clientPhone: res.phone, manualPrice: res.minOrder, 
                    time: res.time || '22:30', notes: res.notes || '' 
                } 
            });
        }

        function renderForm() {
            const d = state.formData;
            return `<div class="glass p-5 rounded-[2rem] space-y-3">
                <div class="flex justify-between items-center"><button onclick="updateState({isAdding: false, editingId: null})" class="text-slate-400 font-black uppercase text-tiny">חזור</button><h2 class="text-amber-500 font-black uppercase text-tiny">${state.editingId ? 'עריכת הזמנה' : 'חדש'}</h2></div>
                <input id="f-name" placeholder="שם לקוח" value="${d.clientName}" oninput="state.formData.clientName = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white font-bold outline-none">
                <input id="f-phone" placeholder="טלפון" type="tel" value="${d.clientPhone}" oninput="state.formData.clientPhone = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white font-bold outline-none" dir="ltr">
                <div class="flex gap-2">
                    <div class="flex-1"><label class="text-[8px] text-slate-500 block mr-2">שעה</label><input type="time" value="${d.time}" oninput="state.formData.time = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white font-bold outline-none"></div>
                    <div class="flex-1"><label class="text-[8px] text-slate-500 block mr-2">אנשים</label><input type="number" value="${d.pax}" oninput="state.formData.pax = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white text-center font-black"></div>
                </div>
                <textarea placeholder="הערות (יומולדת, VIP, בקשות מיוחדות...)" oninput="state.formData.notes = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white outline-none h-20">${d.notes}</textarea>
                <div class="flex gap-1.5">${['table','bar','free'].map(t => `<button onclick="state.formData.type='${t}'; render();" class="flex-1 py-3 rounded-xl border-2 font-black uppercase ${state.formData.type===t?'bg-amber-500 text-black border-amber-500':'bg-white/5 text-slate-400 border-white/10'}">${t==='table'?'שולחן':t==='bar'?'בר':'חינם'}</button>`).join('')}</div>
                <button onclick="saveCurrentBooking()" class="w-full btn-amber py-4 rounded-xl font-black uppercase">שמור הזמנה</button>
            </div>`;
        }

        async function saveCurrentBooking() {
            if(!state.formData.clientName || !state.formData.pax) return alert("חובה שם וכמות");
            const data = {
                venueId: state.venueId, name: state.formData.clientName, phone: state.formData.clientPhone || "",
                type: state.formData.type, pax: Number(state.formData.pax), eventDate: state.selectedDate,
                minOrder: Number(state.formData.manualPrice || (state.formData.pax * 300)),
                time: state.formData.time, notes: state.formData.notes,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (state.editingId) { await db.collection('reservations').doc(state.editingId).update(data); }
            else { data.promoterId = state.phone; data.promoterName = state.userName; data.status = 'active'; data.arrived = false; await db.collection('reservations').add(data); }
            updateState({ isAdding: false, editingId: null, formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, time: '22:30', notes: '' } });
        }

        function exportToWhatsApp(date, list) {
            const vName = allVenues.find(v => v.id === state.venueId)?.name || "Club";
            let text = `*${vName.toUpperCase()} - ${date.split('-').reverse().join('.')}*\n\n`;
            ['table', 'bar'].forEach(type => {
                const filtered = list.filter(r => r.type === type);
                if (filtered.length) {
                    text += `*🏠 ${type === 'table' ? 'שולחנות' : 'בר'}:*\n`;
                    filtered.forEach((r, i) => { 
                        text += `${i + 1}. *${r.name}* | ${r.pax} איש | ${r.time || '22:30'} | ${r.tableNumber ? 'שולחן '+r.tableNumber : '₪'+r.minOrder}${r.notes ? ' | _' + r.notes + '_' : ''}\n`; 
                    });
                    text += `\n`;
                }
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function sendWhatsAppToClient(id) {
            const res = state.reservations.find(r => r.id === id);
            const venue = allVenues.find(v => v.id === state.venueId);
            const wazeUrl = `https://waze.com/ul?q=${encodeURIComponent(venue.waze)}&navigate=yes`;
            const msg = `אהלן ${res.name}, הזמנתך ל-${venue.name} מאושרת ל ${res.pax} אנשים בשעה ${res.time || '22:30'}.📍 ${venue.waze}. ${wazeUrl}`;
            window.open(`https://wa.me/${res.phone.replace(/\D/g,'').replace(/^0/, '972')}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderDashboard(list) {
            const viewList = state.role === 'admin' ? list : list.filter(r => r.promoterId === state.phone);
            const pending = viewList.filter(r => !r.arrived).sort((a,b) => (a.time || '22:30').localeCompare(b.time || '22:30'));
            const arrived = viewList.filter(r => r.arrived);
            return `
                <div class="grid grid-cols-4 gap-1 mb-3">
                    <div class="glass p-2 rounded-lg text-center"><p class="text-[8px] text-slate-500">שולחן</p><p class="font-black">${pending.filter(r=>r.type==='table').reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-2 rounded-lg text-center"><p class="text-[8px] text-slate-500">בר</p><p class="font-black">${pending.filter(r=>r.type==='bar').reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-2 rounded-lg text-center text-green-400"><p class="text-[8px]">הגיעו</p><p class="font-black">${arrived.reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-2 rounded-lg text-center text-amber-500"><p class="text-[8px]">סה"כ</p><p class="font-black">${pending.reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                </div>
                <div class="flex gap-1 mb-3">
                    <button onclick="updateState({isAdding: true})" class="flex-1 btn-amber py-3 rounded-xl font-black uppercase">+ הוספה</button>
                    <button onclick="exportToWhatsApp('${state.selectedDate}', ${JSON.stringify(pending).replace(/"/g, '&quot;')})" class="flex-1 bg-green-600 text-white rounded-xl font-black text-[10px] uppercase flex items-center justify-center gap-2">ייצוא <i data-lucide="share-2" size="14"></i></button>
                </div>
                <div class="glass rounded-xl overflow-hidden border border-white/5">
                    ${['table', 'bar', 'free'].map(type => {
                        const g = pending.filter(r => r.type === type);
                        return g.length ? `<div><div class="group-header">${type==='table'?'שולחנות':type==='bar'?'בר':'חינם'}</div>${g.map(r => renderRow(r)).join('')}</div>` : '';
                    }).join('')}
                </div>
            `;
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4"><div class="glass p-10 rounded-3xl w-full max-w-xs text-center"><h2 class="text-2xl font-black mb-8 text-amber-500 italic">CLUBPRO</h2><input id="l-in" placeholder="טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white font-bold text-lg"><button onclick="login(document.getElementById('l-in').value)" class="w-full btn-amber py-4 rounded-xl font-black">כניסה</button></div></div>`;
                return;
            }
            if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center gap-4 text-white">${allVenues.map(v => `<button onclick="updateState({venueId:'${v.id}'})" class="glass w-full max-w-xs p-6 rounded-2xl text-xl font-black uppercase">${v.name}</button>`).join('')}</div>`;
                return;
            }
            if (!state.isDateConfirmed) {
                root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center p-6 gap-6 text-white"><h2 class="font-black text-xl">בחר תאריך:</h2><div class="glass p-8 rounded-3xl w-full max-w-xs text-center"><input type="date" value="${state.selectedDate}" onchange="state.selectedDate=this.value" class="w-full bg-white/10 border border-white/20 rounded-xl p-4 text-white text-center font-black"><button onclick="updateState({isDateConfirmed:true})" class="w-full btn-amber py-4 rounded-xl mt-6 font-black uppercase">אישור</button></div></div>`;
                return;
            }

            const list = state.reservations.filter(r => r.status === 'active' && r.eventDate === state.selectedDate && (r.venueId === state.venueId));
            root.innerHTML = `
                <div class="flex flex-col h-screen text-white">
                    <header class="p-2 border-b border-white/5 flex justify-between items-center bg-slate-950">
                        <div class="font-black text-amber-500 uppercase text-sm">${allVenues.find(v=>v.id===state.venueId).name}</div>
                        <div class="flex gap-2">
                            <button onclick="updateState({isDateConfirmed:false})" class="text-tiny px-3 py-1.5 rounded-lg glass">תאריך</button>
                            <button onclick="updateState({venueId:null, isDateConfirmed:false})" class="text-tiny px-3 py-1.5 rounded-lg border border-amber-500/50 text-amber-500 uppercase">בית</button>
                        </div>
                    </header>
                    <main class="flex-1 overflow-y-auto p-2">${state.isAdding ? renderForm() : renderDashboard(list)}</main>
                </div>`;
            lucide.createIcons();
        }

        db.collection('reservations').onSnapshot(s => { updateState({ reservations: s.docs.map(d => ({id:d.id, ...d.data()})) }); });
        db.collection('users').onSnapshot(s => { updateState({ users: s.docs.map(d => ({id:d.id, ...d.data()})) }); });
        render();
    </script>
</body>
</html>
