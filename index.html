<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/fimamorgan/CLUB-MANAGER1/main/1%20(1).png">
    <link rel="manifest" href="data:application/manifest+json,{'name':'ClubPro','short_name':'ClubPro','display':'standalone','start_url':'.','background_color':'#020617','theme_color':'#f59e0b','icons':[{'src':'https://raw.githubusercontent.com/fimamorgan/CLUB-MANAGER1/main/1%20(1).png','sizes':'192x192','type':'image/png'}]}">
    <title>ClubPro V24 - WhatsApp Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; font-size: 12px; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .alert-banner { background: #dc2626; color: white; padding: 12px; font-weight: 900; text-align: center; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; animation: slideDown 0.5s ease-out; box-shadow: 0 10px 40px rgba(220, 38, 38, 0.5); }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 3px solid #f59e0b; font-size: 10px; padding: 4px 8px; color: #f59e0b; font-weight: 900; }
        .arrived-section { background: rgba(34, 197, 94, 0.05); border: 1px dashed rgba(34, 197, 94, 0.2); border-radius: 1rem; }
        input, button, select, p, span, div { font-size: 12px !important; }
        .text-tiny { font-size: 9px !important; }
        .text-big { font-size: 14px !important; }
    </style>
</head>
<body>
    <div id="app"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        const config = {
            firebase: {
                apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
                authDomain: "clubpro-system.firebaseapp.com",
                projectId: "clubpro-system",
                storageBucket: "clubpro-system.firebasestorage.app",
                messagingSenderId: "825897406218",
                appId: "1:825897406218:web:a660e48a120361247934f3"
            }
        };

        firebase.initializeApp(config.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
        const todayStr = new Date().toISOString().split('T')[0];
        const venues = [{ id: 'shalvata', name: 'Shalvata' }, { id: 'q_gallery', name: 'Q-GALLERY' }, { id: 'ruki_vverh', name: 'РУКИ ВВЕРХ' }];

        let lastCount = 0;
        let isFirstLoad = true;
        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: sessionStorage.getItem('last_venue') || null,
            selectedDate: sessionStorage.getItem('last_date') || todayStr,
            reservations: [], users: [], isAdding: false, showArrived: false,
            newAlert: false, alertEnabled: false,
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '' }
        };

        function updateState(newData) { 
            state = { ...state, ...newData }; 
            if (state.venueId) sessionStorage.setItem('last_venue', state.venueId);
            if (state.selectedDate) sessionStorage.setItem('last_date', state.selectedDate);
            render(); 
        }

        function triggerAlert() {
            if (state.role === 'admin' && state.alertEnabled) {
                const audio = document.getElementById('alert-sound');
                audio.play().catch(() => {});
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                updateState({ newAlert: true });
                setTimeout(() => updateState({ newAlert: false }), 8000);
            }
        }

        function enableAlerts() {
            const audio = document.getElementById('alert-sound');
            audio.play().then(() => {
                audio.pause(); audio.currentTime = 0;
                updateState({ alertEnabled: true });
                alert("צליל ורטט הופעלו!");
            }).catch(() => alert("נא לאפשר סאונד בדפדפן"));
        }

        async function login(val) {
            const clean = val.trim();
            if (clean.toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                return;
            }
            if (clean.length >= 10) {
                const userDoc = await db.collection('users').doc(clean).get();
                if (userDoc.exists) {
                    const d = userDoc.data();
                    updateState({ role: 'promoter', userName: d.name, phone: clean });
                    localStorage.setItem('club_role', 'promoter');
                    localStorage.setItem('club_name', d.name);
                }
            }
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4 text-white"><div class="w-full max-w-xs glass p-10 rounded-3xl border border-white/10 text-center shadow-2xl"><h2 class="text-2xl font-black mb-10 italic text-amber-500">CLUBPRO</h2><input id="login-input" type="text" placeholder="מספר טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white outline-none font-bold text-lg"><button onclick="login(document.getElementById('login-input').value)" class="w-full btn-amber py-4 rounded-xl uppercase font-black">כניסה</button></div></div>`;
            } else if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-4 text-white"><h2 class="text-lg font-black text-amber-500 uppercase">בחר מועדון:</h2><div class="grid grid-cols-1 gap-3 w-full max-w-xs">${venues.map(v => `<div onclick="updateState({venueId: '${v.id}'})" class="glass p-6 rounded-2xl text-center text-xl font-black uppercase border-white/10 active:scale-95 transition-all">${v.name}</div>`).join('')}</div></div>`;
            } else {
                renderMainContent(root);
            }
        }

        function renderMainContent(root) {
            const venue = venues.find(v => v.id === state.venueId);
            const allList = state.reservations.filter(r => r.status === 'active' && r.venueId === state.venueId && r.eventDate === state.selectedDate);
            const pendingList = allList.filter(r => !r.arrived);
            const arrivedList = allList.filter(r => r.arrived);
            
            const stats = { 
                pendingT: pendingList.filter(r=>r.type==='table').reduce((a,b)=>a+Number(b.pax),0),
                pendingB: pendingList.filter(r=>r.type==='bar').reduce((a,b)=>a+Number(b.pax),0),
                arrivedCount: arrivedList.reduce((a,b)=>a+Number(b.pax),0),
                totalZ: allList.reduce((a,b)=>a+Number(b.actualRevenue || 0), 0)
            };

            root.innerHTML = `
                ${state.newAlert ? `<div class="alert-banner">🚨 הזמנה חדשה נכנסה!</div>` : ''}
                ${!state.alertEnabled && state.role === 'admin' ? `<div class="fixed bottom-4 left-4 right-4 z-50 bg-blue-600 text-white p-3 rounded-2xl flex justify-between items-center shadow-2xl font-black border border-white/10"><span>הפעל צליל ורטט?</span><button onclick="enableAlerts()" class="bg-white text-blue-600 px-4 py-1 rounded-xl">כן</button></div>` : ''}
                
                <div class="flex flex-col h-screen overflow-hidden text-right text-white">
                    <header class="bg-slate-950 p-2 border-b border-white/5 flex justify-between items-center shadow-lg">
                        <div class="font-black italic text-base uppercase text-amber-500 pr-2">${venue.name}</div>
                        <button onclick="updateState({venueId: null})" class="text-amber-500 font-black text-tiny border border-amber-500/50 px-3 py-1 rounded-lg bg-amber-500/5 uppercase">בית</button>
                    </header>
                    <div class="bg-slate-900 p-1 border-b border-white/5 flex items-center justify-between px-3">
                        <input type="date" value="${state.selectedDate}" onchange="updateState({selectedDate: this.value})" class="bg-white/10 border border-white/20 rounded p-1 text-white text-tiny outline-none font-black">
                        <div class="text-tiny font-black uppercase bg-white/10 px-2 py-0.5 rounded border border-white/5">יום ${daysHebrew[new Date(state.selectedDate).getDay()]}</div>
                    </div>
                    <main class="flex-1 overflow-y-auto p-2 bg-slate-950/50 space-y-3">
                        <div class="grid grid-cols-4 gap-1">
                            <div class="glass p-1.5 rounded-lg text-center"><p class="text-tiny text-slate-500 font-black uppercase">שולחנות</p><p class="font-black">${stats.pendingT}</p></div>
                            <div class="glass p-1.5 rounded-lg text-center"><p class="text-tiny text-slate-500 font-black uppercase">בר</p><p class="font-black">${stats.pendingB}</p></div>
                            <div class="glass p-1.5 rounded-lg text-center border-green-500/30 bg-green-500/5 text-green-400"><p class="text-tiny font-black uppercase">בפנים</p><p class="font-black">${stats.arrivedCount}</p></div>
                            <div class="glass p-1.5 rounded-lg text-center border-blue-500/30 text-blue-400"><p class="text-tiny font-black uppercase">TOTAL Z</p><p class="font-black">₪${stats.totalZ}</p></div>
                        </div>

                        ${state.isAdding ? renderForm() : `
                            <button onclick="updateState({isAdding: true})" class="w-full btn-amber py-3 rounded-xl font-black uppercase shadow-lg">+ הוספת הזמנה</button>
                            
                            ${state.role === 'admin' ? `
                            <div class="flex justify-center py-1">
                                <button onclick="exportToWhatsApp('${venue.name}', '${state.selectedDate}', ${JSON.stringify(pendingList).replace(/"/g, '&quot;')})" class="bg-green-600 text-white px-10 py-2 rounded-full font-black text-tiny flex items-center gap-2 shadow-2xl uppercase">ייצוא לווצאפ <i data-lucide="share-2" size="14"></i></button>
                            </div>` : ''}

                            <div class="glass rounded-xl overflow-hidden border border-white/5 shadow-xl">
                                <div class="bg-white/5 p-2 text-tiny font-black uppercase tracking-widest text-slate-400 text-center">הזמנות בחוץ</div>
                                ${['table', 'bar', 'free'].map(type => {
                                    const gList = pendingList.filter(r => r.type === type);
                                    if(gList.length === 0) return '';
                                    return `<div><div class="group-header uppercase">${type === 'table' ? 'שולחנות' : type === 'bar' ? 'בר' : 'כניסות חינם'}</div>${gList.map(r => renderRow(r)).join('')}</div>`;
                                }).join('')}
                            </div>

                            <div class="arrived-section p-1 mt-2">
                                <button onclick="updateState({showArrived: !state.showArrived})" class="w-full flex justify-between items-center p-2 text-green-500 font-black text-tiny uppercase">
                                    <span>לקוחות שבתוך המועדון (${arrivedList.length})</span>
                                    <i data-lucide="${state.showArrived ? 'chevron-up' : 'chevron-down'}" size="14"></i>
                                </button>
                                ${state.showArrived ? arrivedList.map(r => renderRow(r)).join('') : ''}
                            </div>
                        `}
                    </main>
                </div>`;
            lucide.createIcons();
        }

        function renderRow(res) {
            return `
                <div class="flex items-center justify-between p-2 border-b border-white/5 ${res.arrived ? 'opacity-50' : ''}">
                    <div class="flex items-center gap-2 text-right">
                        <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-5 h-5 rounded accent-green-500">
                        <div>
                            <p class="font-black text-white leading-tight">${res.name} (${res.pax})</p>
                            <p class="text-tiny text-slate-400 font-bold">₪${res.minOrder} | ${res.promoterName}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-0.5">
                        ${state.role === 'admin' ? `<input type="number" placeholder="Z" value="${res.actualRevenue || ''}" onchange="db.collection('reservations').doc('${res.id}').update({actualRevenue: Number(this.value)})" class="w-10 bg-black border border-white/20 rounded p-1 text-center text-green-400 font-black outline-none">` : ''}
                        <button onclick="sendWhatsAppToClient('${res.id}')" class="text-green-500 p-1.5"><i data-lucide="message-circle" size="18"></i></button>
                        <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1.5"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>`;
        }

        function renderForm() {
            return `<div class="glass p-5 rounded-[2rem] space-y-4 text-right shadow-2xl"><h2 class="text-amber-500 font-black text-center text-tiny uppercase tracking-widest">הזמנה חדשה</h2><input id="f-name" placeholder="שם לקוח" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold shadow-inner"><input id="f-phone" placeholder="טלפון" type="tel" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-left text-white outline-none font-bold shadow-inner" dir="ltr"><div class="flex gap-1.5">${['table','bar','free'].map(t => `<button id="btn-${t}" onclick="updateFormType('${t}')" class="flex-1 py-3 rounded-xl border-2 font-black uppercase ${state.formData.type===t?'bg-amber-500 text-black border-amber-500 shadow-md':'bg-white/5 text-slate-400 border-white/10'}">${t==='table'?'שולחן':t==='bar'?'בר':'חינם'}</button>`).join('')}</div><div class="grid grid-cols-2 gap-3"><div><label class="text-tiny text-slate-500 font-black uppercase pr-2">אנשים</label><input id="f-pax" type="number" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white text-center font-black"></div><div><label class="text-tiny text-amber-500 font-black uppercase pr-2">מינ' ₪</label><input id="f-price" type="number" class="w-full bg-amber-500/10 border border-amber-500/20 rounded-xl p-3 text-amber-500 text-center font-black"></div></div><div class="flex justify-between items-center pt-2"><button onclick="updateState({isAdding: false})" class="text-slate-500 font-black uppercase">ביטול</button><button onclick="saveNewBooking()" class="btn-amber px-14 py-4 rounded-xl shadow-xl uppercase font-black">שמור</button></div></div>`;
        }

        function updateFormType(t) { state.formData.type = t; render(); }

        function exportToWhatsApp(vName, date, list) {
            const dName = daysHebrew[new Date(date).getDay()];
            let text = `*${vName.toUpperCase()} - יום ${dName} ${date}*\n--------------------------\n\n`;
            [{id:'table',l:'שולחנות'},{id:'bar',l:'בר'},{id:'free',l:'כניסות חינם'}].forEach(t => {
                const filtered = list.filter(r => r.type === t.id);
                if (filtered.length > 0) {
                    text += `*🏠 ${t.l}:*\n`;
                    filtered.forEach((r, i) => { text += `${i + 1}. *${r.name.trim()}* | אנשים: ${r.pax} | מינ': ₪${r.minOrder} | יחצן: ${r.promoterName}\n`; });
                    text += `\n`;
                }
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function sendWhatsAppToClient(id) {
            const res = state.reservations.find(r => r.id === id);
            const vId = state.venueId;
            let msg = "";
            if (vId === 'shalvata') {
                msg = `אהלן ${res.name}, הזמנתך מאושרת ל ${res.pax} אנשים. התחלה 22:00. 📍 התערוכה 3, ת"א. https://waze.com/ul?q=התערוכה%203%20תל%20אביב&navigate=yes`;
            } else if (vId === 'q_gallery') {
                msg = `אהלן ${res.name}, הזמנתך מאושרת ל ${res.pax} אנשים. התחלה 22:00. 📍 רוטשילד 19, ת"א. https://waze.com/ul?q=רוטשילד%2019%20תל%20אביב&navigate=yes`;
            } else {
                msg = `אהלן ${res.name}, הזמנתך מאושרת ל ${res.pax} אנשים. התחלה 22:30. 📍 טברסקי 14, ת"א. https://waze.com/ul?q=טברסקי%2014%20תל%20אביב&navigate=yes`;
            }
            window.open(`https://wa.me/${res.phone.replace(/\D/g,'').replace(/^0/, '972')}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        async function saveNewBooking() {
            const name = document.getElementById('f-name').value;
            const pax = document.getElementById('f-pax').value;
            if(!name || !pax) return alert("שם וכמות חובה");
            const data = {
                venueId: state.venueId, name: name, phone: document.getElementById('f-phone').value || "",
                type: state.formData.type, pax: Number(pax), eventDate: state.selectedDate,
                minOrder: Number(document.getElementById('f-price').value || (pax * 300)), 
                promoterId: state.phone, promoterName: state.userName, status: 'active', arrived: false, actualRevenue: 0,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('reservations').add(data);
            updateState({ isAdding: false });
        }

        auth.onAuthStateChanged(user => {
            if (!user) { auth.signInAnonymously(); return; }
            db.collection('reservations').onSnapshot(snap => { 
                const newRes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (!isFirstLoad && newRes.length > lastCount) triggerAlert();
                lastCount = newRes.length; isFirstLoad = false;
                updateState({ reservations: newRes }); 
            });
            db.collection('users').onSnapshot(snap => { updateState({ users: snap.docs.map(d => ({ id: d.id, ...d.data() })) }); });
        });
    </script>
</body>
</html>
