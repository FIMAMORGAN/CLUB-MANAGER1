<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubPro V16 - Production Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .arrived { border-right: 4px solid #22c55e !important; background: rgba(34, 197, 94, 0.05) !important; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 4px solid #f59e0b; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 p-4 rounded-xl hidden font-bold shadow-2xl"></div>
    <div id="app"></div>

    <script>
        const config = {
            firebase: {
                apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
                authDomain: "clubpro-system.firebaseapp.com",
                projectId: "clubpro-system",
                storageBucket: "clubpro-system.firebasestorage.app",
                messagingSenderId: "825897406218",
                appId: "1:825897406218:web:a660e48a120361247934f3"
            }
        };

        firebase.initializeApp(config.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["יום ראשון", "יום שני", "יום שלישי", "יום רביעי", "יום חמישי", "יום שישי", "יום שבת"];
        const todayStr = new Date().toISOString().split('T')[0];

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            reservations: [], isAdding: false, editingId: null, showSummary: false,
            selectedDate: '', 
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, eventDate: todayStr, notes: '' }
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        function getDayName(dateStr) {
            const d = new Date(dateStr);
            return daysHebrew[d.getDay()];
        }

        async function login(val) {
            const clean = val.trim();
            if (clean.toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                localStorage.setItem('club_name', 'Admin');
                localStorage.setItem('club_phone', 'ADMIN');
            } else if (clean.length >= 10) {
                const userDoc = await db.collection('users').doc(clean).get();
                let name = userDoc.exists ? userDoc.data().name : prompt("שם יחצן חדש:");
                if (name) {
                    if (!userDoc.exists) await db.collection('users').doc(clean).set({ name, phone: clean });
                    updateState({ role: 'promoter', userName: name, phone: clean });
                    localStorage.setItem('club_role', 'promoter');
                    localStorage.setItem('club_name', name);
                    localStorage.setItem('club_phone', clean);
                }
            }
        }

        async function saveBooking(e) {
            e.preventDefault();
            const paxNum = Number(state.formData.pax);
            let min = state.formData.manualPrice || (state.formData.type === 'free' ? 0 : paxNum * 300);
            const data = {
                name: state.formData.clientName, phone: state.formData.clientPhone,
                type: state.formData.type, pax: paxNum, eventDate: state.formData.eventDate,
                minOrder: Number(min), notes: state.formData.notes || "",
                promoterId: state.phone, promoterName: state.userName, status: 'active',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (state.editingId) await db.collection('reservations').doc(state.editingId).update(data);
            else { data.arrived = false; data.actualRevenue = 0; await db.collection('reservations').add(data); }
            updateState({ isAdding: false, editingId: null, formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, eventDate: todayStr, notes: '' } });
        }

        function exportToWhatsApp(type, list) {
            if (list.length === 0) return;
            const date = state.selectedDate || "כללי";
            const day = state.selectedDate ? getDayName(state.selectedDate) : "";
            let text = `*רשימת הזמנות ${type === 'table' ? 'שולחנות' : 'בר'} - ${day} ${date}*\n\n`;
            
            list.filter(r => r.type === type).forEach((r, i) => {
                text += `${i + 1}. *${r.name}* | PAX: ${r.pax} | Min: ₪${r.minOrder} | שעה: 22:30 | יחצן: ${r.promoterName}\n`;
                text += `   📞 ${r.phone} ${r.notes ? '\n   📝 ' + r.notes : ''}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4 text-center"><div class="w-full max-w-md glass p-10 rounded-[2rem] border border-white/10"><h2 class="text-3xl font-black mb-8 italic text-white uppercase tracking-widest">Login</h2><input id="login-input" type="text" placeholder="קוד או טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white text-xl outline-none"><button onclick="login(document.getElementById('login-input').value)" class="w-full btn-amber py-4 rounded-xl uppercase font-black shadow-xl">כניסה</button></div></div>`;
                return;
            }

            let list = state.reservations.filter(r => r.status === 'active');
            if (state.selectedDate) list = list.filter(r => r.eventDate === state.selectedDate);
            else list = list.filter(r => r.eventDate >= todayStr);
            if (state.role !== 'admin') list = list.filter(r => r.promoterId === state.phone);
            list = list.sort((a,b) => a.eventDate.localeCompare(b.eventDate));

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden">
                    <header class="bg-slate-950 p-4 border-b border-white/5 flex justify-between items-center">
                        <div class="font-black italic text-xl uppercase tracking-tighter">CLUB<span class="text-amber-500">PRO</span></div>
                        <button onclick="localStorage.clear(); location.reload();" class="text-slate-500"><i data-lucide="log-out" size="18"></i></button>
                    </header>
                    <div class="bg-slate-900 p-3 border-b border-white/5 flex items-center justify-between px-4">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-amber-500 font-black">לאיזה תאריך?</span>
                            <input type="date" value="${state.selectedDate}" onchange="updateState({selectedDate: this.value})" class="bg-white/5 border border-white/10 rounded-xl p-2 text-white text-xs outline-none font-bold">
                        </div>
                        ${state.selectedDate ? '<button onclick="updateState({selectedDate: \'\'})" class="text-[10px] font-black text-blue-400">הצג הכל</button>' : ''}
                    </div>
                    <main class="flex-1 overflow-y-auto p-4 bg-slate-950/50">
                        ${state.showSummary ? renderSummary(list) : (state.isAdding ? renderForm() : (state.role === 'admin' ? renderAdmin(list) : renderPromoter(list)))}
                    </main>
                </div>
            `;
            lucide.createIcons();
        }

        function renderForm() {
            return `
                <div class="glass p-6 rounded-2xl space-y-4 border border-white/5 text-right">
                    <h2 class="text-amber-500 font-black text-center">${state.editingId ? 'עריכת הזמנה' : 'הזמנה חדשה'}</h2>
                    <input placeholder="שם לקוח" value="${state.formData.clientName}" oninput="state.formData.clientName = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-right outline-none font-bold">
                    <input placeholder="טלפון" type="tel" value="${state.formData.clientPhone}" oninput="state.formData.clientPhone = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-left text-white outline-none font-bold" dir="ltr">
                    <div class="flex flex-col gap-1"><span class="text-[10px] text-amber-500 font-black pr-1">יום ${getDayName(state.formData.eventDate)}</span><input type="date" value="${state.formData.eventDate}" onchange="state.formData.eventDate = this.value; render();" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white outline-none font-bold"></div>
                    <div class="flex gap-1">${['table','bar','free'].map(t => `<button onclick="state.formData.type='${t}'; render();" class="flex-1 py-2 rounded-lg border text-[10px] font-black uppercase ${state.formData.type===t?'bg-amber-500 text-black border-amber-500':'bg-white/5 text-slate-400 border-white/10'}">${t}</button>`).join('')}</div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[10px] text-slate-500 font-black">PAX</label><input type="number" value="${state.formData.pax}" oninput="state.formData.pax=this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-center font-bold"></div>
                        <div><label class="text-[10px] text-amber-500 font-black text-right">Min ₪</label><input type="number" value="${state.formData.manualPrice || (state.formData.pax*300)}" oninput="state.formData.manualPrice=this.value" class="w-full bg-amber-500/10 border border-amber-500/20 rounded-lg p-3 text-amber-500 text-center font-black"></div>
                    </div>
                    <textarea placeholder="הערות..." oninput="state.formData.notes = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-right h-16 font-bold">${state.formData.notes || ''}</textarea>
                    <div class="flex justify-between items-center pt-2 font-black"><button onclick="updateState({isAdding: false, editingId: null})" class="text-slate-500 uppercase text-xs">ביטול</button><button onclick="saveBooking(event)" class="btn-amber px-10 py-3 rounded-lg shadow-xl uppercase">אשר ושמור</button></div>
                </div>`;
        }

        function renderAdmin(list) {
            const stats = { tablePax: 0, barPax: 0, z: 0 };
            list.forEach(r => { if(r.type==='table') stats.tablePax+=Number(r.pax); if(r.type==='bar') stats.barPax+=Number(r.pax); stats.z+=Number(r.actualRevenue); });
            const renderGroup = (title, type) => {
                const gList = list.filter(r => r.type === type);
                if (gList.length === 0) return '';
                return `<div class="mt-4"><div class="flex justify-between items-center group-header p-2 mb-2"><span class="font-black text-amber-500 text-[10px] uppercase">${title}</span><button onclick="exportToWhatsApp('${type}', list)" class="text-[10px] text-green-500 font-bold flex items-center gap-1">ייצוא לווצאפ <i data-lucide="share-2" size="10"></i></button></div>${gList.map(r => renderRow(r, true)).join('')}</div>`;
            };
            return `<div class="space-y-4"><div class="flex justify-between gap-2"><button onclick="updateState({showSummary: true})" class="flex-1 bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">סיכום עמלות</button><button onclick="updateState({isAdding: true})" class="flex-1 btn-amber py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">הזמנה חדשה</button></div><div class="grid grid-cols-3 gap-2"><div class="glass p-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 font-black">TABLE PAX</p><p class="text-lg font-black">${stats.tablePax}</p></div><div class="glass p-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 font-black">BAR PAX</p><p class="text-lg font-black">${stats.barPax}</p></div><div class="glass p-2 rounded-xl text-center border-green-500/30 border"><p class="text-[8px] text-green-500 font-black">TOTAL Z</p><p class="text-lg font-black text-green-400">₪${stats.z}</p></div></div><div class="glass rounded-2xl overflow-hidden mt-4 border border-white/5">${renderGroup('Tables', 'table')} ${renderGroup('Bar', 'bar')} ${renderGroup('Free Entry', 'free')}</div></div>`;
        }

        function renderPromoter(list) {
            return `<div class="space-y-6"><div class="flex justify-between items-center"><h2 class="text-xl font-black italic uppercase">My List</h2><button onclick="updateState({isAdding: true})" class="btn-amber px-6 py-2 rounded-lg text-sm uppercase font-black">+ New</button></div><div class="space-y-3">${list.map(r => renderRow(r, false)).join('')}</div></div>`;
        }

        function renderRow(res, isAdmin) {
            return `
                <div class="flex items-center justify-between p-3 border-b border-white/5 ${res.arrived ? 'bg-green-500/5 arrived' : ''}">
                    <div class="flex items-center gap-3">
                        ${isAdmin ? `<input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-4 h-4 rounded accent-green-500">` : ''}
                        <div class="text-right">
                            <p class="font-bold text-white text-xs font-black">${res.name} (${res.pax}) <span class="text-[8px] text-amber-500 font-black uppercase">[${res.promoterName}]</span></p>
                            <p class="text-[9px] text-slate-400 font-bold">${getDayName(res.eventDate)} ${res.eventDate} | Min: ₪${res.minOrder}</p>
                            ${res.notes ? `<p class="text-[10px] text-white font-bold bg-white/5 p-1 rounded mt-1 border-r-2 border-amber-500">📝 ${res.notes}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        ${isAdmin ? `<input type="number" placeholder="Z" value="${res.actualRevenue || ''}" onchange="db.collection('reservations').doc('${res.id}').update({actualRevenue: Number(this.value)})" class="w-12 bg-black border border-white/10 rounded p-1 text-center text-green-400 text-[10px] font-bold outline-none">` : ''}
                        <button onclick="startEdit('${res.id}')" class="text-amber-500 p-1"><i data-lucide="edit-3" size="14"></i></button>
                        <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                </div>`;
        }

        function renderSummary(list) {
            const summary = {}; list.forEach(r => { const p = r.promoterName || 'Admin'; if (!summary[p]) summary[p] = { count: 0, z: 0 }; summary[p].count++; summary[p].z += Number(r.actualRevenue || 0); });
            let totalComm = 0;
            const tableRows = Object.entries(summary).map(([name, data]) => {
                const comm = (data.z * 0.1).toFixed(0); totalComm += Number(comm);
                return `<tr><td class="p-4 font-black">${name}</td><td class="p-4">${data.count}</td><td class="p-4 font-black text-green-400">₪${data.z}</td><td class="p-4 font-black text-amber-500">₪${comm}</td></tr>`;
            }).join('');
            return `<div class="max-w-4xl mx-auto space-y-6"><div class="flex justify-between items-center"><button onclick="updateState({showSummary: false})" class="bg-red-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">חזור</button><h2 class="text-xl font-black text-amber-500 uppercase">עמלות 10%</h2></div><div class="glass rounded-2xl overflow-hidden border border-white/10"><table class="w-full text-sm"><thead class="bg-white/5 text-[10px] uppercase font-black text-slate-400"><tr><th class="p-4 text-right">יחצן</th><th class="p-4 text-right">הזמנות</th><th class="p-4 text-right text-green-400">Z</th><th class="p-4 text-right text-amber-500">עמלה</th></tr></thead><tbody class="divide-y divide-white/5">${tableRows}</tbody><tfoot class="bg-amber-500/10 font-black"><tr><td colspan="3" class="p-4 text-right">סה"כ לתשלום:</td><td class="p-4 text-amber-500 text-xl italic">₪${totalComm}</td></tr></tfoot></table></div></div>`;
        }

        auth.onAuthStateChanged(user => {
            if (!user) { auth.signInAnonymously(); return; }
            db.collection('reservations').onSnapshot(snap => { updateState({ reservations: snap.docs.map(d => ({ id: d.id, ...d.data() })) }); });
        });
    </script>
</body>
</html>
