<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubPro V17 - Multi Venue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .arrived { border-right: 4px solid #22c55e !important; background: rgba(34, 197, 94, 0.05) !important; }
        .venue-card { transition: all 0.3s ease; cursor: pointer; border: 2px solid transparent; }
        .venue-card:hover { transform: translateY(-5px); border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 4px solid #f59e0b; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const config = {
            firebase: {
                apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
                authDomain: "clubpro-system.firebaseapp.com",
                projectId: "clubpro-system",
                storageBucket: "clubpro-system.firebasestorage.app",
                messagingSenderId: "825897406218",
                appId: "1:825897406218:web:a660e48a120361247934f3"
            }
        };

        firebase.initializeApp(config.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["יום ראשון", "יום שני", "יום שלישי", "יום רביעי", "יום חמישי", "יום שישי", "יום שבת"];
        const todayStr = new Date().toISOString().split('T')[0];

        const venues = [
            { id: 'shalvata', name: 'Shalvata', logo: 'https://raw.githubusercontent.com/fimamorgan/CLUB-MANAGER1/main/1%20(1).png' },
            { id: 'q_gallery', name: 'Q-GALLERY', logo: 'https://raw.githubusercontent.com/fimamorgan/CLUB-MANAGER1/main/2.png' },
            { id: 'ruki_vverh', name: 'Руки вверх', logo: 'https://raw.githubusercontent.com/fimamorgan/CLUB-MANAGER1/main/3.png' }
        ];

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: null, // המועדון הנבחר
            reservations: [], isAdding: false, editingId: null, showSummary: false,
            selectedDate: todayStr, 
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '', eventDate: todayStr }
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        function getDayName(dateStr) {
            const d = new Date(dateStr);
            return daysHebrew[d.getDay()];
        }

        async function login(val) {
            const clean = val.trim();
            if (clean.toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                localStorage.setItem('club_name', 'Admin');
                localStorage.setItem('club_phone', 'ADMIN');
            } else if (clean.length >= 10) {
                const userDoc = await db.collection('users').doc(clean).get();
                let name = userDoc.exists ? userDoc.data().name : prompt("שם יחצן חדש:");
                if (name) {
                    if (!userDoc.exists) await db.collection('users').doc(clean).set({ name, phone: clean });
                    updateState({ role: 'promoter', userName: name, phone: clean });
                    localStorage.setItem('club_role', 'promoter');
                    localStorage.setItem('club_name', name);
                    localStorage.setItem('club_phone', clean);
                }
            }
        }

        async function saveBooking(e) {
            e.preventDefault();
            const dateToSave = state.formData.eventDate || state.selectedDate || todayStr;
            const paxNum = Number(state.formData.pax);
            let min = state.formData.manualPrice || (state.formData.type === 'free' ? 0 : paxNum * 300);
            const data = {
                venueId: state.venueId,
                name: state.formData.clientName, phone: state.formData.clientPhone,
                type: state.formData.type, pax: paxNum, eventDate: dateToSave,
                minOrder: Number(min), notes: state.formData.notes || "",
                promoterId: state.phone, promoterName: state.userName, status: 'active',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (state.editingId) await db.collection('reservations').doc(state.editingId).update(data);
            else { data.arrived = false; data.actualRevenue = 0; await db.collection('reservations').add(data); }
            updateState({ isAdding: false, editingId: null, formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '', eventDate: todayStr } });
        }

        function exportDailyList(date, dayList) {
            const venue = venues.find(v => v.id === state.venueId);
            const dayName = getDayName(date);
            let text = `*${venue.name} - רשימת הזמנות ${dayName} ${date}*\n`;
            text += `--------------------------\n\n`;

            ['table', 'bar', 'free'].forEach(type => {
                const filtered = dayList.filter(r => r.type === type);
                if (filtered.length > 0) {
                    text += `*${type === 'table' ? '🏠 שולחנות' : type === 'bar' ? '🍸 בר' : '🎟️ כניסות חינם'}:*\n`;
                    filtered.forEach((r, i) => {
                        text += `${i + 1}. *${r.name}* | אנשים: ${r.pax} | מינימום: ₪${r.minOrder} | יחצן: ${r.promoterName}\n`;
                        if(r.notes) text += `   📝 הערה: ${r.notes}\n`;
                    });
                    text += `\n`;
                }
            });

            const totalPax = dayList.reduce((sum, r) => sum + Number(r.pax || 0), 0);
            text += `*סה"כ קהל צפוי: ${totalPax}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function render() {
            const root = document.getElementById('app');
            
            // 1. שלב לוגין
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4 text-center"><div class="w-full max-w-md glass p-10 rounded-[2rem] border border-white/10 text-white"><h2 class="text-3xl font-black mb-8 italic uppercase tracking-widest text-white">Login</h2><input id="login-input" type="text" placeholder="קוד או טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white text-xl outline-none"><button onclick="login(document.getElementById('login-input').value)" class="w-full btn-amber py-4 rounded-xl uppercase font-black shadow-xl">כניסה</button></div></div>`;
                return;
            }

            // 2. שלב בחירת מועדון (Lobby)
            if (!state.venueId) {
                root.innerHTML = `
                    <div class="h-screen p-6 flex flex-col items-center justify-center space-y-8">
                        <h2 class="text-3xl font-black text-amber-500 uppercase tracking-tighter">לאיזה מקום סוגרים?</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl">
                            ${venues.map(v => `
                                <div onclick="updateState({venueId: '${v.id}'})" class="venue-card glass p-8 rounded-[2rem] flex flex-col items-center justify-center text-center space-y-4">
                                    <img src="${v.logo}" class="h-24 w-auto object-contain mb-4" alt="${v.name}">
                                    <span class="text-xl font-black uppercase text-white">${v.name}</span>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="localStorage.clear(); location.reload();" class="text-slate-500 text-sm font-bold flex items-center gap-2 underline uppercase"><i data-lucide="log-out" size="14"></i> התנתק</button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // 3. תצוגת ניהול מועדון ספציפי
            const selectedVenue = venues.find(v => v.id === state.venueId);
            let list = state.reservations.filter(r => r.status === 'active' && r.venueId === state.venueId);
            
            if (state.selectedDate) list = list.filter(r => r.eventDate === state.selectedDate);
            else list = list.filter(r => r.eventDate >= todayStr);
            
            if (state.role !== 'admin') list = list.filter(r => r.promoterId === state.phone);
            list = list.sort((a,b) => a.eventDate.localeCompare(b.eventDate));

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden">
                    <header class="bg-slate-950 p-4 border-b border-white/5 flex justify-between items-center text-white">
                        <div class="flex items-center gap-3">
                            <img src="${selectedVenue.logo}" class="h-8 w-auto">
                            <div class="font-black italic text-xl uppercase tracking-tighter">${selectedVenue.name}</div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="updateState({venueId: null, isAdding: false, showSummary: false})" class="text-amber-500 text-[10px] font-black uppercase">החלף מקום</button>
                            <button onclick="localStorage.clear(); location.reload();" class="text-slate-500"><i data-lucide="log-out" size="18"></i></button>
                        </div>
                    </header>
                    <div class="bg-slate-900 p-3 border-b border-white/5 flex items-center justify-between px-4">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-amber-500 font-black uppercase">לצפייה בעבר</span>
                            <input type="date" value="${state.selectedDate}" onchange="updateState({selectedDate: this.value})" class="bg-white/5 border border-white/10 rounded-xl p-2 text-white text-xs outline-none font-bold">
                        </div>
                        <div class="text-[10px] font-black text-white uppercase">${getDayName(state.selectedDate || todayStr)}</div>
                    </div>
                    <main class="flex-1 overflow-y-auto p-4 bg-slate-950/50">
                        ${state.showSummary ? renderSummary(list) : (state.isAdding ? renderForm() : (state.role === 'admin' ? renderAdmin(list) : renderPromoter(list)))}
                    </main>
                </div>
            `;
            lucide.createIcons();
        }

        function renderAdmin(list) {
            const dates = [...new Set(list.map(r => r.eventDate))].sort();
            return `
                <div class="space-y-4">
                    <div class="flex justify-between gap-2 text-white">
                        <button onclick="updateState({showSummary: true})" class="flex-1 bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-lg font-black">סיכום עמלות</button>
                        <button onclick="updateState({isAdding: true})" class="flex-1 btn-amber py-3 rounded-xl text-[10px] font-black uppercase shadow-lg font-black">הזמנה חדשה</button>
                    </div>
                    ${dates.map(date => {
                        const dayList = list.filter(r => r.eventDate === date);
                        const stats = { tables: 0, bar: 0 };
                        dayList.forEach(r => { if(r.type==='table') stats.tables+=Number(r.pax); if(r.type==='bar') stats.bar+=Number(r.pax); });
                        return `
                            <div class="mb-8">
                                <div class="flex justify-between items-center mb-2">
                                    <h3 class="text-amber-500 font-black text-lg">${getDayName(date)} - ${date}</h3>
                                    <button onclick="exportDailyList('${date}', state.reservations.filter(r => r.eventDate === '${date}' && r.venueId === '${state.venueId}' && r.status === 'active'))" class="bg-green-600 text-white text-[10px] px-3 py-1 rounded-full font-black flex items-center gap-1">ייצוא רשימה <i data-lucide="share-2" size="10"></i></button>
                                </div>
                                <div class="grid grid-cols-2 gap-2 mb-4">
                                    <div class="glass p-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 font-black">אנשים בשולחנות</p><p class="text-lg font-black text-white">${stats.tables}</p></div>
                                    <div class="glass p-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 font-black">אנשים בבר</p><p class="text-lg font-black text-white">${stats.bar}</p></div>
                                </div>
                                <div class="glass rounded-2xl overflow-hidden border border-white/5 divide-y divide-white/5">
                                    ${['table', 'bar', 'free'].map(type => {
                                        const gList = dayList.filter(r => r.type === type);
                                        if(gList.length === 0) return '';
                                        return `<div class="p-2"><div class="group-header p-2 mb-2 font-black text-amber-500 text-[10px] uppercase">${type}</div>${gList.map(r => renderRow(r, true)).join('')}</div>`;
                                    }).join('')}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderRow(res, isAdmin) {
            return `
                <div class="flex items-center justify-between p-3 ${res.arrived ? 'bg-green-500/5 arrived' : ''}">
                    <div class="flex items-center gap-3">
                        ${isAdmin ? `<input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-5 h-5 accent-green-500">` : ''}
                        <div class="text-right">
                            <p class="font-bold text-white text-xs font-black">${res.name} (${res.pax}) <span class="text-[8px] text-amber-500">[${res.promoterName}]</span></p>
                            <p class="text-[9px] text-slate-400 italic">מינימום: ₪${res.minOrder}</p>
                            ${res.notes ? `<p class="text-[10px] text-white font-bold bg-white/5 p-1 rounded mt-1 border-r-2 border-amber-500">📝 ${res.notes}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        ${isAdmin ? `<input type="number" value="${res.actualRevenue || ''}" onchange="db.collection('reservations').doc('${res.id}').update({actualRevenue: Number(this.value)})" class="w-12 bg-black border border-white/10 rounded p-1 text-center text-green-400 text-xs font-bold outline-none">` : ''}
                        <button onclick="updateState({editingId: '${res.id}', isAdding: true, formData: {clientName:'${res.name}', clientPhone:'${res.phone}', type:'${res.type}', pax:'${res.pax}', manualPrice:'${res.minOrder}', notes:'${res.notes || ''}', eventDate:'${res.eventDate}'}})" class="text-amber-500 p-1"><i data-lucide="edit-3" size="16"></i></button>
                        <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                </div>`;
        }

        function renderPromoter(list) {
            return `<div class="space-y-6"><div class="flex justify-between items-center text-white"><h2 class="text-xl font-black italic uppercase">ההזמנות שלי</h2><button onclick="updateState({isAdding: true})" class="btn-amber px-6 py-2 rounded-lg text-sm uppercase font-black font-black">+ חדש</button></div><div class="space-y-3">${list.map(r => renderRow(r, false)).join('')}</div></div>`;
        }

        function renderForm() {
            const dateDisplay = state.formData.eventDate || state.selectedDate || todayStr;
            return `<div class="glass p-6 rounded-2xl space-y-4 border border-white/5 text-right text-white"><h2 class="text-amber-500 font-black text-center">${state.editingId ? 'עריכת הזמנה' : 'הזמנה חדשה'}</h2><div class="flex flex-col gap-1"><span class="text-[10px] text-amber-500 font-black">תאריך: ${getDayName(dateDisplay)}</span><input type="date" value="${dateDisplay}" onchange="state.formData.eventDate = this.value; render();" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white outline-none font-bold"></div><input placeholder="שם לקוח" value="${state.formData.clientName}" oninput="state.formData.clientName = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-right outline-none font-bold"><input placeholder="טלפון" type="tel" value="${state.formData.clientPhone}" oninput="state.formData.clientPhone = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-left text-white outline-none font-bold" dir="ltr"><div class="flex gap-1">${['table','bar','free'].map(t => `<button onclick="state.formData.type='${t}'; render();" class="flex-1 py-2 rounded-lg border text-[10px] font-black uppercase ${state.formData.type===t?'bg-amber-500 text-black border-amber-500':'bg-white/5 text-slate-400 border-white/10'}">${t}</button>`).join('')}</div><div class="grid grid-cols-2 gap-2"><div><label class="text-[10px] text-slate-500 font-black">PAX</label><input type="number" value="${state.formData.pax}" oninput="state.formData.pax=this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-center font-bold"></div><div><label class="text-[10px] text-amber-500 font-black text-right">Min ₪</label><input type="number" value="${state.formData.manualPrice || (state.formData.pax*300)}" oninput="state.formData.manualPrice=this.value" class="w-full bg-amber-500/10 border border-amber-500/20 rounded-lg p-3 text-amber-500 text-center font-black"></div></div><textarea placeholder="הערות..." oninput="state.formData.notes = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-right h-16 font-bold text-white">${state.formData.notes || ''}</textarea><div class="flex justify-between items-center pt-2 font-black"><button onclick="updateState({isAdding: false, editingId: null})" class="text-slate-500 uppercase text-xs font-black">ביטול</button><button onclick="saveBooking(event)" class="btn-amber px-10 py-3 rounded-lg shadow-xl uppercase font-black">אשר ושמור</button></div></div>`;
        }

        function renderSummary(list) {
            const summary = {}; list.forEach(r => { const p = r.promoterName || 'Admin'; if (!summary[p]) summary[p] = { count: 0, z: 0 }; summary[p].count++; summary[p].z += Number(r.actualRevenue || 0); });
            let totalComm = 0;
            const tableRows = Object.entries(summary).map(([name, data]) => {
                const comm = (data.z * 0.1).toFixed(0); totalComm += Number(comm);
                return `<tr><td class="p-4 font-black text-right">${name}</td><td class="p-4 text-white text-right">${data.count}</td><td class="p-4 font-black text-green-400 text-right">₪${data.z}</td><td class="p-4 font-black text-amber-500 text-right">₪${comm}</td></tr>`;
            }).join('');
            return `<div class="max-w-4xl mx-auto space-y-6 text-white"><div class="flex justify-between items-center"><button onclick="updateState({showSummary: false})" class="bg-red-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">חזור</button><h2 class="text-xl font-black text-amber-500 uppercase">עמלות 10%</h2></div><div class="glass rounded-2xl overflow-hidden border border-white/10"><table class="w-full text-sm text-white"><thead class="bg-white/5 text-[10px] uppercase font-black text-slate-400 text-right"><tr><th class="p-4">יחצן</th><th class="p-4">הזמנות</th><th class="p-4">Z</th><th class="p-4">עמלה</th></tr></thead><tbody class="divide-y divide-white/5">${tableRows}</tbody><tfoot class="bg-amber-500/10 font-black"><tr><td colspan="3" class="p-4 text-right">סה"כ לתשלום:</td><td class="p-4 text-amber-500 text-xl italic text-right">₪${totalComm}</td></tr></tfoot></table></div></div>`;
        }

        auth.onAuthStateChanged(user => {
            if (!user) { auth.signInAnonymously(); return; }
            db.collection('reservations').onSnapshot(snap => { updateState({ reservations: snap.docs.map(d => ({ id: d.id, ...d.data() })) }); });
        });
    </script>
</body>
</html>
