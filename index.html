<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro V74 - Date Picker Restored</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; font-size: 12px; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 3px solid #f59e0b; font-size: 10px; padding: 4px 8px; color: #f59e0b; font-weight: 900; }
    </style>
</head>
<body>
    <div id="app"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
        const getToday = () => new Date().toISOString().split('T')[0];

        const allVenues = [
            { id: 'shalvata', name: 'Shalvata' },
            { id: 'q_gallery', name: 'Q-GALLERY' },
            { id: 'ruki_vverh', name: 'РУКИ ВВЕРХ' }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const autoVenue = urlParams.get('confirmed') ? 'q_gallery' : null;

        let state = {
            role: localStorage.getItem('club_role') || null,
            venueId: autoVenue || localStorage.getItem('last_venue') || null,
            selectedDate: getToday(),
            isDateConfirmed: !!autoVenue,
            reservations: [], users: [], isAdding: false, showArrived: false, showUsers: false, showSummary: false,
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '' }
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        function renderDashboard(list) {
            const pending = list.filter(r => !r.arrived);
            const arrived = list.filter(r => r.arrived);
            
            return `
                <div class="grid grid-cols-4 gap-1">
                    <div class="glass p-1.5 rounded-lg text-center"><p class="text-[8px] text-slate-500 uppercase font-black">שולחנות</p><p class="font-black">${pending.filter(r=>r.type==='table').reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-1.5 rounded-lg text-center"><p class="text-[8px] text-slate-500 uppercase font-black">בר</p><p class="font-black">${pending.filter(r=>r.type==='bar').reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-1.5 rounded-lg text-center border-green-500/30 text-green-400"><p class="text-[8px] uppercase font-black">כמה הגיעו</p><p class="font-black">${arrived.reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-1.5 rounded-lg text-center border-amber-500/30 text-amber-500"><p class="text-[8px] uppercase font-black">מוזמנים</p><p class="font-black">${pending.reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                </div>

                <div class="flex gap-1">
                    ${state.role==='admin' ? `<button onclick="updateState({showUsers:true})" class="flex-1 bg-slate-800 py-2.5 rounded-xl font-black text-[10px]">יחצנים</button><button onclick="updateState({showSummary:true})" class="flex-1 bg-blue-900/30 py-2.5 rounded-xl font-black text-blue-400 text-[10px]">עמלות</button>` : ''}
                    <button onclick="updateState({isAdding:true})" class="flex-[2] btn-amber py-2.5 rounded-xl font-black uppercase">+ הוספת הזמנה</button>
                </div>

                ${state.venueId === 'q_gallery' ? `<button onclick="window.location.href='floorplan.html?date=${state.selectedDate}'" class="w-full bg-blue-600/20 text-blue-400 border border-blue-500/30 py-4 rounded-2xl font-black flex items-center justify-center gap-3"><i data-lucide="map"></i> מפת שולחנות</button>` : ''}

                <div class="glass rounded-xl overflow-hidden">
                    <div class="bg-white/5 p-2 text-[10px] font-black text-center text-slate-400 uppercase tracking-widest">
                        הזמנות ליום ${state.selectedDate.split('-').reverse().join('.')}
                    </div>
                    ${['table','bar','free'].map(t => {
                        const g = pending.filter(r => r.type === t);
                        return g.length ? `<div><div class="group-header uppercase">${t==='table'?'שולחנות':t==='bar'?'בר':'חינם'}</div>${g.map(r => renderRow(r)).join('')}</div>` : '';
                    }).join('')}
                </div>
            `;
        }

        function renderRow(res) {
            return `<div class="flex items-center justify-between p-2 border-b border-white/5">
                <div class="flex items-center gap-2">
                    <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived:this.checked})" class="w-5 h-5 accent-green-500">
                    <div>
                        <p class="font-black text-white">${res.name} (${res.pax})</p>
                        <p class="text-[9px] font-bold uppercase text-slate-400">
                            ${res.tableNumber ? `<span class="text-amber-500">שולחן ${res.tableNumber}</span> <button onclick="db.collection('reservations').doc('${res.id}').update({tableNumber:firebase.firestore.FieldValue.delete()})" class="text-red-500 px-1 font-black">X</button>` : '₪'+(res.minOrder||0)} | ${res.promoterName || 'Admin'}
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    ${state.venueId === 'q_gallery' ? `<button onclick="window.location.href='floorplan.html?assignTo=${res.id}&date=${state.selectedDate}'" class="text-blue-400 p-1.5"><i data-lucide="map-pin" size="18"></i></button>` : ''}
                    <button onclick="window.open('https://wa.me/${res.phone?.replace(/\D/g,'')}')" class="text-green-500 p-1.5"><i data-lucide="message-circle" size="18"></i></button>
                    <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1.5"><i data-lucide="trash-2" size="18"></i></button>
                </div>
            </div>`;
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) { 
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4"><div class="glass p-10 rounded-3xl text-center shadow-2xl"><h2 class="text-2xl font-black mb-10 text-amber-500 italic">CLUBPRO</h2><input id="l-in" placeholder="טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white font-bold outline-none"><button onclick="login(document.getElementById('l-in').value)" class="w-full btn-amber py-4 rounded-xl font-black uppercase">כניסה</button></div></div>`;
                return;
            }
            if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-4 text-white"><h2 class="text-lg font-black text-amber-500 uppercase tracking-widest italic">SELECT VENUE</h2><div class="grid grid-cols-1 gap-3 w-full max-w-xs">${allVenues.map(v => `<div onclick="localStorage.setItem('last_venue', '${v.id}'); updateState({venueId: '${v.id}'})" class="glass p-6 rounded-2xl text-center text-xl font-black uppercase border-white/10 active:scale-95 transition-all">${v.name}</div>`).join('')}</div></div>`;
                return;
            }
            if (!state.isDateConfirmed) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-6 text-white"><button onclick="updateState({venueId:null})" class="text-amber-500 font-black text-[10px] uppercase border border-amber-500/30 px-6 py-2 rounded-full bg-amber-500/5 shadow-lg">חזור לבחירת מועדון</button><h2 class="text-xl font-black uppercase text-center">בחר תאריך:</h2><div class="glass p-8 rounded-3xl w-full max-w-xs text-center border-white/5 shadow-2xl"><input type="date" value="${state.selectedDate}" onchange="state.selectedDate = this.value; render();" class="w-full bg-white/10 border border-white/20 rounded-xl p-4 text-white text-3xl outline-none font-black text-center"><button onclick="updateState({isDateConfirmed:true})" class="w-full btn-amber py-4 rounded-xl mt-6 font-black uppercase shadow-xl">אישור תאריך</button></div></div>`;
                return;
            }

            const venue = allVenues.find(v => v.id === state.venueId);
            const list = state.reservations.filter(r => r.status === 'active' && r.eventDate === state.selectedDate && (r.venueId === state.venueId || !r.venueId));

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden text-right text-white">
                    <header class="bg-slate-950 p-2 border-b border-white/5 flex justify-between items-center shadow-lg">
                        <div class="font-black italic text-sm uppercase text-amber-500 pr-2">${venue.name}</div>
                        <div class="flex gap-2">
                            <button onclick="updateState({isDateConfirmed:false})" class="text-slate-400 font-black text-[9px] border border-white/10 px-3 py-1.5 rounded-lg bg-white/5 uppercase">שינוי תאריך</button>
                            <button onclick="updateState({venueId:null, isDateConfirmed:false})" class="text-amber-500 font-black text-[9px] border border-amber-500/50 px-3 py-1.5 rounded-lg bg-amber-500/5 uppercase">בית</button>
                        </div>
                    </header>
                    <main class="flex-1 overflow-y-auto p-2 bg-slate-950/50 space-y-3">
                        ${state.showUsers ? 'USER MGMT' : (state.showSummary ? 'COMMISSION' : renderDashboard(list))}
                    </main>
                </div>`;
            lucide.createIcons();
        }

        async function login(val) {
            if (val.trim().toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin' });
                localStorage.setItem('club_role', 'admin');
            }
        }

        db.collection('reservations').onSnapshot(snap => { 
            updateState({ reservations: snap.docs.map(d => ({id:d.id, ...d.data()})) });
        });
        auth.onAuthStateChanged(u => { if(!u) auth.signInAnonymously(); });
    </script>
</body>
</html>
