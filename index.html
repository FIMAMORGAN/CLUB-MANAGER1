<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/fimamorgan/CLUB-MANAGER1/main/1%20(1).png">
    <link rel="manifest" href="data:application/manifest+json,{'name':'ClubPro','short_name':'ClubPro','display':'standalone','start_url':'.','background_color':'#020617','theme_color':'#f59e0b','icons':[{'src':'https://raw.githubusercontent.com/fimamorgan/CLUB-MANAGER1/main/1%20(1).png','sizes':'192x192','type':'image/png'}]}">
    <title>ClubPro V21 - Live Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; font-size: 11px; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 2px solid #f59e0b; font-size: 9px; padding: 2px 6px; color: #f59e0b; font-weight: 900; }
        .arrived-section { background: rgba(34, 197, 94, 0.05); border: 1px dashed rgba(34, 197, 94, 0.2); border-radius: 1rem; }
    </style>
</head>
<body>
    <div id="app"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        const config = {
            firebase: {
                apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
                authDomain: "clubpro-system.firebaseapp.com",
                projectId: "clubpro-system",
                storageBucket: "clubpro-system.firebasestorage.app",
                messagingSenderId: "825897406218",
                appId: "1:825897406218:web:a660e48a120361247934f3"
            }
        };

        firebase.initializeApp(config.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
        const todayStr = new Date().toISOString().split('T')[0];
        const venues = [
            { id: 'shalvata', name: 'Shalvata' },
            { id: 'q_gallery', name: 'Q-GALLERY' },
            { id: 'ruki_vverh', name: 'РУКИ ВВЕРХ' }
        ];

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: sessionStorage.getItem('last_venue') || null,
            selectedDate: sessionStorage.getItem('last_date') || todayStr,
            reservations: [], users: [], isAdding: false, showArrived: false,
            alertEnabled: false, formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '' }
        };

        function updateState(newData) { 
            state = { ...state, ...newData }; 
            render(); 
        }

        async function login(val) {
            const clean = val.trim();
            if (clean.toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                return;
            }
            if (clean.length >= 10) {
                const userDoc = await db.collection('users').doc(clean).get();
                if (userDoc.exists) {
                    const d = userDoc.data();
                    updateState({ role: 'promoter', userName: d.name, phone: clean });
                    localStorage.setItem('club_role', 'promoter');
                }
            }
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4 text-white"><div class="w-full max-w-xs glass p-10 rounded-3xl border border-white/10 text-center shadow-2xl"><h2 class="text-2xl font-black mb-10 italic text-amber-500">CLUBPRO</h2><input id="login-input" type="text" placeholder="מספר טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white outline-none font-bold text-lg"><button onclick="login(document.getElementById('login-input').value)" class="w-full btn-amber py-4 rounded-xl uppercase font-black">כניסה</button></div></div>`;
            } else if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-4 text-white"><h2 class="text-lg font-black text-amber-500 uppercase">בחר מועדון:</h2><div class="grid grid-cols-1 gap-3 w-full max-w-xs">${venues.map(v => `<div onclick="updateState({venueId: '${v.id}'})" class="glass p-6 rounded-2xl text-center text-xl font-black uppercase border-white/10 active:scale-95 transition-all">${v.name}</div>`).join('')}</div></div>`;
            } else {
                renderMainContent(root);
            }
            lucide.createIcons();
        }

        function renderMainContent(root) {
            const venue = venues.find(v => v.id === state.venueId);
            const allList = state.reservations.filter(r => r.status === 'active' && r.venueId === state.venueId && r.eventDate === state.selectedDate);
            const pendingList = allList.filter(r => !r.arrived);
            const arrivedList = allList.filter(r => r.arrived);
            
            const stats = { 
                pendingT: pendingList.filter(r=>r.type==='table').reduce((a,b)=>a+Number(b.pax),0),
                pendingB: pendingList.filter(r=>r.type==='bar').reduce((a,b)=>a+Number(b.pax),0),
                arrivedCount: arrivedList.reduce((a,b)=>a+Number(b.pax),0),
                totalZ: allList.reduce((a,b)=>a+Number(b.actualRevenue || 0), 0)
            };

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden text-right text-white">
                    <header class="bg-slate-950 p-2 border-b border-white/5 flex justify-between items-center shadow-lg">
                        <div class="font-black italic text-sm uppercase text-amber-500 pr-2">${venue.name}</div>
                        <button onclick="updateState({venueId: null})" class="text-amber-500 font-black text-[9px] border border-amber-500/50 px-2.5 py-1 rounded-lg bg-amber-500/5 uppercase">בית</button>
                    </header>
                    <div class="bg-slate-900 p-1.5 border-b border-white/5 flex items-center justify-between px-3">
                        <input type="date" value="${state.selectedDate}" onchange="updateState({selectedDate: this.value})" class="bg-white/10 border border-white/20 rounded p-1 text-white text-[10px] outline-none font-black">
                        <div class="text-[9px] font-black uppercase bg-white/10 px-2 py-0.5 rounded border border-white/5">יום ${daysHebrew[new Date(state.selectedDate).getDay()]}</div>
                    </div>
                    <main class="flex-1 overflow-y-auto p-2 bg-slate-950/50 space-y-3">
                        <div class="grid grid-cols-4 gap-1">
                            <div class="glass p-1.5 rounded-lg text-center border-amber-500/20"><p class="text-[6px] text-slate-500 font-black uppercase">שולחנות (בחוץ)</p><p class="text-xs font-black">${stats.pendingT}</p></div>
                            <div class="glass p-1.5 rounded-lg text-center border-amber-500/20"><p class="text-[6px] text-slate-500 font-black uppercase">בר (בחוץ)</p><p class="text-xs font-black">${stats.pendingB}</p></div>
                            <div class="glass p-1.5 rounded-lg text-center border-green-500/30 bg-green-500/5"><p class="text-[6px] text-green-500 font-black uppercase">בפנים</p><p class="text-xs font-black">${stats.arrivedCount}</p></div>
                            <div class="glass p-1.5 rounded-lg text-center border-blue-500/30"><p class="text-[6px] text-blue-500 font-black uppercase">TOTAL Z</p><p class="text-xs font-black">₪${stats.totalZ}</p></div>
                        </div>

                        ${state.isAdding ? renderForm() : `
                            <div class="flex gap-1">
                                <button onclick="updateState({isAdding: true})" class="flex-1 btn-amber py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">+ הוספת הזמנה חדשה</button>
                            </div>
                            
                            <div class="glass rounded-xl overflow-hidden border border-white/5 shadow-xl">
                                <div class="bg-white/5 p-2 text-[8px] font-black uppercase tracking-widest text-slate-400">הזמנות שטרם הגיעו</div>
                                ${['table', 'bar', 'free'].map(type => {
                                    const gList = pendingList.filter(r => r.type === type);
                                    if(gList.length === 0) return '';
                                    return `<div><div class="group-header uppercase">${type === 'table' ? 'שולחנות' : type === 'bar' ? 'בר' : 'כניסות חינם'}</div>${gList.map(r => renderRow(r, true)).join('')}</div>`;
                                }).join('')}
                            </div>

                            <div class="arrived-section p-1">
                                <button onclick="updateState({showArrived: !state.showArrived})" class="w-full flex justify-between items-center p-2 text-green-500 font-black text-[9px] uppercase">
                                    <span>לקוחות שכבר נכנסו (${arrivedList.length})</span>
                                    <i data-lucide="${state.showArrived ? 'chevron-up' : 'chevron-down'}" size="14"></i>
                                </button>
                                ${state.showArrived ? arrivedList.map(r => renderRow(r, true)).join('') : ''}
                            </div>
                        `}
                    </main>
                </div>`;
            lucide.createIcons();
        }

        function renderRow(res, isAdmin) {
            return `
                <div class="flex items-center justify-between p-2 border-b border-white/5 ${res.arrived ? 'opacity-60 bg-green-500/5' : ''}">
                    <div class="flex items-center gap-1.5 text-right">
                        <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-4 h-4 accent-green-500">
                        <div>
                            <p class="font-black text-xs text-white leading-tight">${res.name} (${res.pax})</p>
                            <p class="text-[8px] text-slate-400 font-bold italic">₪${res.minOrder} | ${res.promoterName}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-0.5">
                        ${state.role === 'admin' ? `<input type="number" placeholder="Z" value="${res.actualRevenue || ''}" onchange="db.collection('reservations').doc('${res.id}').update({actualRevenue: Number(this.value)})" class="w-9 bg-black border border-white/20 rounded p-0.5 text-center text-green-400 text-[9px] font-black outline-none">` : ''}
                        <button onclick="sendWhatsAppToClient('${res.id}')" class="text-green-500 p-1"><i data-lucide="message-circle" size="16"></i></button>
                        <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                </div>`;
        }

        function renderForm() {
            return `<div class="glass p-5 rounded-[2rem] space-y-4 text-right shadow-2xl"><h2 class="text-amber-500 font-black text-center text-xs uppercase">הזמנה חדשה</h2><input placeholder="שם לקוח" oninput="state.formData.clientName = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold text-sm shadow-inner"><input placeholder="טלפון" type="tel" oninput="state.formData.clientPhone = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-left text-white outline-none font-bold text-sm shadow-inner" dir="ltr"><div class="flex gap-1.5">${['table','bar','free'].map(t => `<button onclick="state.formData.type='${t}'; render();" class="flex-1 py-3 rounded-xl border-2 text-[10px] font-black uppercase ${state.formData.type===t?'bg-amber-500 text-black border-amber-500 shadow-md':'bg-white/5 text-slate-400 border-white/10'}">${t==='table'?'שולחן':t==='bar'?'בר':'חינם'}</button>`).join('')}</div><div class="grid grid-cols-2 gap-3"><div><label class="text-[8px] text-slate-500 font-black uppercase pr-2">כמות אנשים</label><input type="number" oninput="state.formData.pax=this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white text-center font-black"></div><div><label class="text-[8px] text-amber-500 font-black uppercase pr-2">מינימום ₪</label><input type="number" oninput="state.formData.manualPrice=this.value" class="w-full bg-amber-500/10 border border-amber-500/20 rounded-xl p-3 text-amber-500 text-center font-black"></div></div><div class="flex justify-between items-center pt-2"><button onclick="updateState({isAdding: false})" class="text-slate-500 font-black uppercase text-[10px]">ביטול</button><button onclick="saveBooking(event)" class="btn-amber px-12 py-4 rounded-xl shadow-xl uppercase font-black text-xs tracking-widest">שמור</button></div></div>`;
        }

        async function saveBooking(e) {
            e.preventDefault();
            const data = {
                venueId: state.venueId, name: state.formData.clientName, phone: state.formData.clientPhone,
                type: state.formData.type, pax: Number(state.formData.pax), eventDate: state.selectedDate,
                minOrder: Number(state.formData.manualPrice || (state.formData.pax * 300)), 
                promoterId: state.phone, promoterName: state.userName, status: 'active', arrived: false, actualRevenue: 0,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('reservations').add(data);
            updateState({ isAdding: false });
        }

        function sendWhatsAppToClient(id) {
            const res = state.reservations.find(r => r.id === id);
            const msg = `אהלן ${res.name}, הזמנתך מאושרת ל ${res.pax} אנשים. נתראה!`;
            window.open(`https://wa.me/${res.phone.replace(/\D/g,'').replace(/^0/, '972')}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        auth.onAuthStateChanged(user => {
            if (!user) { auth.signInAnonymously(); return; }
            db.collection('reservations').onSnapshot(snap => { 
                updateState({ reservations: snap.docs.map(d => ({ id: d.id, ...d.data() })) }); 
            });
        });
    </script>
</body>
</html>
