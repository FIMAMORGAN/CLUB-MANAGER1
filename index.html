<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro V62 - Q-Gallery Integrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .text-tiny { font-size: 9px !important; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();

        let state = {
            role: localStorage.getItem('club_role') || null,
            venueId: localStorage.getItem('last_venue') || null,
            selectedDate: new Date().toISOString().split('T')[0],
            reservations: []
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        // לוגיקת שורה עם אייקון מפה (מופיע רק ב-Q Gallery)
        function renderRow(res) {
            const isQGallery = state.venueId === 'q_gallery';
            return `
            <div class="flex items-center justify-between p-3 border-b border-white/5 ${res.arrived ? 'bg-green-500/5' : ''}">
                <div class="flex items-center gap-3">
                    <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-5 h-5 rounded accent-green-500">
                    <div>
                        <p class="font-black text-white text-sm">${res.name} (${res.pax})</p>
                        <p class="text-tiny font-bold uppercase ${res.arrived ? 'text-green-400' : 'text-slate-400'}">
                            ${res.tableNumber ? '<span class="text-amber-500 font-black">שולחן ' + res.tableNumber + '</span>' : '₪' + (res.minOrder || 0)} | ${res.promoterName || 'Admin'}
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    ${isQGallery ? `
                        <button onclick="window.location.href='floorplan.html?assignTo=${res.id}'" class="text-blue-400 p-2 glass rounded-lg border-blue-500/20">
                            <i data-lucide="map-pin" size="18"></i>
                        </button>
                    ` : ''}
                    <button onclick="window.open('https://wa.me/${res.phone?.replace(/\D/g,'')}','_blank')" class="text-green-500 p-2 glass rounded-lg border-green-500/20">
                        <i data-lucide="message-circle" size="18"></i>
                    </button>
                </div>
            </div>`;
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4"><div class="glass p-10 rounded-3xl text-center shadow-2xl"><h2 class="text-2xl font-black mb-10 text-amber-500 italic">CLUBPRO</h2><input id="l-in" placeholder="סיסמה" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white font-bold outline-none"><button onclick="login(document.getElementById('l-in').value)" class="w-full btn-amber py-4 rounded-xl font-black uppercase">כניסה</button></div></div>`;
                return;
            }

            if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-4"><h2 class="text-lg font-black text-amber-500">בחר מועדון</h2><button onclick="setVenue('q_gallery')" class="w-full max-w-xs glass p-8 rounded-3xl text-xl font-black uppercase border-white/10">Q-GALLERY</button><button onclick="setVenue('shalvata')" class="w-full max-w-xs glass p-8 rounded-3xl text-xl font-black uppercase border-white/10 opacity-50">SHALVATA</button></div>`;
                return;
            }
            
            const list = state.reservations.filter(r => r.status === 'active' && r.eventDate === state.selectedDate && r.venueId === state.venueId);

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden">
                    <header class="p-4 glass flex justify-between items-center shadow-xl">
                        <span class="font-black italic text-amber-500 text-lg uppercase">${state.venueId.replace('_', ' ')}</span>
                        <button onclick="updateState({venueId: null})" class="text-tiny font-black bg-white/5 px-4 py-2 rounded-xl border border-white/10">החלף מועדון</button>
                    </header>
                    
                    <main class="flex-1 overflow-y-auto p-3 space-y-3">
                        ${state.venueId === 'q_gallery' ? `
                            <button onclick="window.location.href='floorplan.html'" class="w-full bg-blue-600/20 text-blue-400 border border-blue-500/30 py-4 rounded-2xl font-black uppercase flex items-center justify-center gap-3 shadow-lg">
                                <i data-lucide="map"></i> MAP VIEW (Q GALLERY)
                            </button>
                        ` : ''}
                        
                        <div class="glass rounded-2xl overflow-hidden divide-y divide-white/5 shadow-2xl">
                            <div class="bg-white/5 p-3 text-tiny font-black uppercase text-center text-slate-500 tracking-widest">רשימת הזמנות - ${state.selectedDate}</div>
                            ${list.length ? list.map(r => renderRow(r)).join('') : '<div class="p-20 text-center text-slate-600 font-bold uppercase italic">No Reservations</div>'}
                        </div>
                    </main>
                </div>`;
            lucide.createIcons();
        }

        function setVenue(id) {
            localStorage.setItem('last_venue', id);
            updateState({ venueId: id });
        }

        function login(v) {
            if(v === 'res') { 
                updateState({role:'admin'}); 
                localStorage.setItem('club_role','admin'); 
            }
        }

        db.collection('reservations').onSnapshot(snap => {
            updateState({ reservations: snap.docs.map(d => ({id: d.id, ...d.data()})) });
        });
    </script>
</body>
</html>
