<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro V98 - Final Text Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; cursor: pointer; }
        .btn-amber:active { transform: scale(0.98); opacity: 0.9; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 3px solid #f59e0b; font-size: 10px; padding: 4px 8px; color: #f59e0b; font-weight: 900; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => { if (!user) auth.signInAnonymously(); });

        const getToday = () => new Date().toISOString().split('T')[0];

        const allVenues = [
            { id: 'shalvata', name: 'Shalvata', map: 'shalvata.html', waze: 'התערוכה 3, ת"א' },
            { id: 'q_gallery', name: 'PULSE TLV', map: 'floorplan.html', waze: 'רוטשילד 19, ת"א' },
            { id: 'ruki_vverh', name: 'RUKI-VERH', map: null, waze: 'טברסקי 14, ת"א' }
        ];

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: localStorage.getItem('last_venue') || null,
            selectedDate: localStorage.getItem('last_date') || getToday(),
            isDateConfirmed: !!localStorage.getItem('last_date'),
            reservations: [], isAdding: false, editingId: null,
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', time: '22:30', notes: '' }
        };

        function updateState(newData) {
            state = { ...state, ...newData };
            if (state.selectedDate) localStorage.setItem('last_date', state.selectedDate);
            if (state.venueId) localStorage.setItem('last_venue', state.venueId);
            render();
        }

        async function saveCurrentBooking() {
            if(!state.formData.clientName || !state.formData.pax) return alert("חובה שם וכמות");
            const data = {
                venueId: state.venueId,
                name: state.formData.clientName,
                phone: state.formData.clientPhone || "",
                type: state.formData.type,
                pax: Number(state.formData.pax),
                eventDate: state.selectedDate,
                time: state.formData.time || '22:30',
                notes: state.formData.notes || "",
                status: 'active',
                arrived: false,
                promoterId: state.phone,
                promoterName: state.userName,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('reservations').add(data);
                updateState({ isAdding: false, formData: { type: 'table', pax: '', clientName: '', clientPhone: '', time: '22:30', notes: '' } });
            } catch (e) { alert("שגיאה: " + e.message); }
        }

        function render() {
            const root = document.getElementById('app');
            
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4"><div class="glass p-10 rounded-3xl w-full max-w-xs text-center"><h2 class="text-2xl font-black mb-8 text-amber-500 italic">CLUBPRO</h2><input id="l-in" placeholder="טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white font-bold text-lg outline-none"><button onclick="loginUser()" class="w-full btn-amber py-4 rounded-xl font-black uppercase">כניסה</button></div></div>`;
                return;
            }

            if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-4 text-white"><h2 class="text-lg font-black text-amber-500 italic">SELECT VENUE</h2>${allVenues.map(v => `<button onclick="updateState({venueId:'${v.id}'})" class="glass w-full max-w-xs p-6 rounded-2xl text-xl font-black uppercase">${v.name}</button>`).join('')}</div>`;
                return;
            }

            if (!state.isDateConfirmed) {
                root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center p-6 gap-6 text-white"><button onclick="updateState({venueId:null})" class="text-amber-500 font-black text-tiny uppercase border border-amber-500/30 px-5 py-2 rounded-full">חזור</button><input type="date" value="${state.selectedDate}" onchange="state.selectedDate=this.value" class="glass p-4 rounded-xl text-white font-black text-center"><button onclick="updateState({isDateConfirmed:true})" class="w-full max-w-xs btn-amber py-4 rounded-xl font-black uppercase">אישור</button></div>`;
                return;
            }

            const venue = allVenues.find(v => v.id === state.venueId);
            const list = state.reservations.filter(r => r.status === 'active' && r.eventDate === state.selectedDate && r.venueId === state.venueId);

            if (state.isAdding) {
                root.innerHTML = `<div class="p-4 space-y-4 text-white">
                    <button onclick="updateState({isAdding:false})" class="text-slate-400 font-black uppercase text-tiny">חזור</button>
                    <div class="glass p-6 rounded-[2rem] space-y-4">
                        <input oninput="state.formData.clientName=this.value" placeholder="שם לקוח" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white font-bold outline-none">
                        <input oninput="state.formData.pax=this.value" type="number" placeholder="כמות אנשים" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white font-bold outline-none">
                        <div class="flex gap-2">
                            <button onclick="state.formData.type='table'; render();" class="flex-1 py-3 rounded-xl border-2 ${state.formData.type==='table'?'bg-amber-500 text-black border-amber-500':'border-white/10 text-slate-400'} font-black">שולחן</button>
                            <button onclick="state.formData.type='bar'; render();" class="flex-1 py-3 rounded-xl border-2 ${state.formData.type==='bar'?'bg-amber-500 text-black border-amber-500':'border-white/10 text-slate-400'} font-black">בר</button>
                        </div>
                        <button onclick="saveCurrentBooking()" class="w-full btn-amber py-4 rounded-xl font-black uppercase">צור הזמנה</button>
                    </div>
                </div>`;
            } else {
                root.innerHTML = `
                <div class="flex flex-col h-screen text-white">
                    <header class="p-3 border-b border-white/5 flex justify-between items-center bg-slate-950 shadow-xl">
                        <div class="font-black italic text-amber-500 uppercase">${venue.name}</div>
                        <button onclick="updateState({venueId:null, isDateConfirmed:false})" class="text-amber-500 border border-amber-500/50 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">בית</button>
                    </header>
                    <main class="p-2 space-y-3">
                        <button onclick="updateState({isAdding:true})" class="w-full btn-amber py-3.5 rounded-xl font-black uppercase shadow-lg">צור הזמנה</button>
                        ${venue.map ? `<button onclick="window.location.href='${venue.map}?date=${state.selectedDate}'" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase flex items-center justify-center gap-2 shadow-lg"><i data-lucide="map"></i> מפת שולחנות</button>` : ''}
                        <div class="glass rounded-xl overflow-hidden divide-y divide-white/5">
                            <div class="bg-white/5 p-2 text-center text-slate-400 font-bold uppercase">${state.selectedDate}</div>
                            ${list.length ? list.map(r => `<div class="p-3 flex justify-between items-center"><div><p class="font-black">${r.name} (${r.pax})</p><p class="text-[10px] text-slate-400">${r.tableNumber ? 'שולחן '+r.tableNumber : r.type}</p></div><button onclick="db.collection('reservations').doc('${r.id}').update({status:'deleted'})" class="text-red-500 p-2"><i data-lucide="trash-2" size="16"></i></button></div>`).join('') : '<p class="p-10 text-center text-slate-600">אין הזמנות</p>'}
                        </div>
                    </main>
                </div>`;
            }
            lucide.createIcons();
        }

        async function loginUser() {
            const phone = document.getElementById('l-in').value;
            if(phone.length < 10) return;
            updateState({ role: 'promoter', userName: 'User', phone: phone });
            localStorage.setItem('club_role', 'promoter');
            localStorage.setItem('club_phone', phone);
        }

        db.collection('reservations').onSnapshot(snap => {
            state.reservations = snap.docs.map(d => ({id:d.id, ...d.data()}));
            render();
        });

        render();
    </script>
</body>
</html>
