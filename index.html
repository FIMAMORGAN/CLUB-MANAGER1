<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro V104 - Transfer Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; font-size: 12px; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 3px solid #f59e0b; font-size: 10px; padding: 4px 8px; color: #f59e0b; font-weight: 900; }
        .transfer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const getToday = () => new Date().toISOString().split('T')[0];

        const allVenues = [
            { id: 'shalvata', name: 'Shalvata', map: 'shalvata.html' },
            { id: 'q_gallery', name: 'PULSE TLV', map: 'floorplan.html' },
            { id: 'ruki_vverh', name: 'RUKI-VERH', map: null }
        ];

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: localStorage.getItem('last_venue') || null,
            selectedDate: localStorage.getItem('last_date') || getToday(),
            isDateConfirmed: !!localStorage.getItem('last_date'),
            reservations: [], isAdding: false,
            transferId: null, // ID של ההזמנה שרוצים להעביר
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, time: '22:30', notes: '' }
        };

        function updateState(newData) { 
            state = { ...state, ...newData }; 
            if (state.selectedDate) localStorage.setItem('last_date', state.selectedDate);
            if (state.venueId) localStorage.setItem('last_venue', state.venueId);
            render(); 
        }

        async function moveReservation(resId, newVenueId) {
            try {
                // העברה למועדון חדש ואיפוס מספר שולחן (כי המספרים שונים בין מועדונים)
                await db.collection('reservations').doc(resId).update({
                    venueId: newVenueId,
                    tableNumber: firebase.firestore.FieldValue.delete()
                });
                updateState({ transferId: null });
            } catch (e) { alert("שגיאה בהעברה: " + e.message); }
        }

        function renderRow(res) {
            const venue = allVenues.find(v => v.id === state.venueId);
            return `
            <div class="flex items-center justify-between p-2 border-b border-white/5">
                <div class="flex items-center gap-2 text-right flex-1 overflow-hidden">
                    <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-5 h-5 rounded accent-green-500">
                    <div class="overflow-hidden">
                        <p class="font-black text-white leading-tight truncate">${res.name} (${res.pax})</p>
                        <p class="text-[9px] text-slate-500 font-bold">${res.time || '22:30'} | ₪${res.minOrder || 0}</p>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="updateState({transferId: '${res.id}'})" class="text-amber-400 p-1.5"><i data-lucide="move-horizontal" size="18"></i></button>
                    <button onclick="sendWhatsAppToClient('${res.id}')" class="text-green-500 p-1.5"><i data-lucide="message-circle" size="18"></i></button>
                    <button onclick="db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1.5"><i data-lucide="trash-2" size="18"></i></button>
                </div>
            </div>`;
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) { /* מסך כניסה רגיל... */ return; }
            if (!state.venueId) { /* בחירת מועדון... */ return; }
            if (!state.isDateConfirmed) { /* בחירת תאריך... */ return; }

            const venue = allVenues.find(v => v.id === state.venueId);
            const list = state.reservations.filter(r => r.status === 'active' && r.eventDate === state.selectedDate && r.venueId === state.venueId);

            root.innerHTML = `
                <div class="flex flex-col h-screen text-white relative">
                    ${state.transferId ? `
                        <div class="transfer-overlay">
                            <div class="glass p-6 rounded-3xl w-full max-w-xs text-center space-y-4">
                                <h3 class="font-black text-amber-500 uppercase">העברת הזמנה למועדון אחר</h3>
                                <p class="text-tiny text-slate-300">בחר לאיזה מועדון להעביר את הלקוח:</p>
                                <div class="flex flex-col gap-2">
                                    ${allVenues.filter(v => v.id !== state.venueId).map(v => `
                                        <button onclick="moveReservation('${state.transferId}', '${v.id}')" class="bg-white/10 p-4 rounded-xl font-black uppercase border border-white/10 active:bg-amber-500 active:text-black">
                                            ${v.name}
                                        </button>
                                    `).join('')}
                                </div>
                                <button onclick="updateState({transferId: null})" class="text-slate-500 font-bold uppercase pt-2">ביטול</button>
                            </div>
                        </div>
                    ` : ''}

                    <header class="bg-slate-950 p-2 border-b border-white/5 flex justify-between items-center">
                        <div class="font-black italic text-amber-500 uppercase">${venue.name}</div>
                        <div class="flex gap-1">
                            <button onclick="updateState({venueId: null, isDateConfirmed: false})" class="text-amber-500 border border-amber-500/50 px-3 py-1 rounded bg-amber-500/5 text-[9px] font-black">בית</button>
                            <button onclick="localStorage.clear(); location.reload();" class="text-red-500 border border-red-500/30 px-3 py-1 rounded bg-red-500/5 text-[9px] font-black uppercase">LOGOUT</button>
                        </div>
                    </header>
                    <main class="flex-1 overflow-y-auto p-2">
                        <button onclick="updateState({isAdding: true})" class="w-full btn-amber py-3.5 rounded-xl font-black uppercase shadow-lg mb-4">צור הזמנה</button>
                        <div class="glass rounded-xl overflow-hidden divide-y divide-white/5">
                            ${list.length ? list.map(r => renderRow(r)).join('') : '<p class="p-10 text-center text-slate-600 font-bold">אין הזמנות</p>'}
                        </div>
                    </main>
                </div>`;
            lucide.createIcons();
        }

        // --- שאר הפונקציות הקיימות (שמירה, ווטסאפ וכו') נשארות כרגיל ---
        db.collection('reservations').onSnapshot(snap => { 
            state.reservations = snap.docs.map(d => ({id:d.id, ...d.data()})); 
            render();
        });
        auth.onAuthStateChanged(u => { if(!u) auth.signInAnonymously(); });
        render();
    </script>
</body>
</html>
