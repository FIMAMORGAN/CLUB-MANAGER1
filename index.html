<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClubPro V68 - Fixed & Integrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; font-size: 12px; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 3px solid #f59e0b; font-size: 10px; padding: 4px 8px; color: #f59e0b; font-weight: 900; }
        .text-tiny { font-size: 9px !important; }
    </style>
</head>
<body>
    <div id="app"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
        const getToday = () => new Date().toISOString().split('T')[0];

        // בדיקה אם חזרנו מהמפה - אם כן, נקבע אוטומטית את המועדון ל-Q Gallery
        const urlParams = new URLSearchParams(window.location.search);
        const confirmed = urlParams.get('confirmed');

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: confirmed ? 'q_gallery' : null, // אם חזרנו מהמפה, כנס ישר ל-Q Gallery
            selectedDate: getToday(),
            isDateConfirmed: confirmed ? true : false,
            reservations: [], users: [], isAdding: false, editingId: null,
            showArrived: false, showUsers: false, showSummary: false,
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null }
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        async function login(val) {
            if (val.trim().toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                return;
            }
            // לוגיקת טלפון יחצן...
        }

        function renderRow(res) {
            return `<div class="flex items-center justify-between p-2 border-b border-white/5 ${res.arrived ? 'opacity-50' : ''}">
                <div class="flex items-center gap-2 text-right">
                    <input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-5 h-5 rounded accent-green-500">
                    <div>
                        <p class="font-black text-white leading-tight">${res.name} (${res.pax})</p>
                        <p class="text-tiny font-bold uppercase ${res.tableNumber ? 'text-amber-500' : 'text-slate-400'}">
                            ${res.tableNumber ? 'שולחן ' + res.tableNumber : '₪' + (res.minOrder || 0)} | ${res.promoterName}
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-0.5">
                    ${state.venueId === 'q_gallery' ? `<button onclick="window.location.href='floorplan.html?assignTo=${res.id}'" class="text-blue-400 p-1.5"><i data-lucide="map-pin" size="18"></i></button>` : ''}
                    <button onclick="sendWhatsAppToClient('${res.id}')" class="text-green-500 p-1.5"><i data-lucide="message-circle" size="18"></i></button>
                    <button onclick="editReservation('${res.id}')" class="text-amber-500 p-1"><i data-lucide="edit-2" size="18"></i></button>
                    <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1.5"><i data-lucide="trash-2" size="18"></i></button>
                </div>
            </div>`;
        }

        function renderDashboard(allList) {
            const pendingList = allList.filter(r => !r.arrived);
            const arrivedList = allList.filter(r => r.arrived);

            return `
                <div class="grid grid-cols-3 gap-1">
                    <div class="glass p-1.5 rounded-lg text-center"><p class="text-tiny text-slate-500 font-black uppercase">שולחנות</p><p class="font-black">${pendingList.filter(r=>r.type==='table').reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-1.5 rounded-lg text-center"><p class="text-tiny text-slate-500 font-black uppercase">בר</p><p class="font-black">${pendingList.filter(r=>r.type==='bar').reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                    <div class="glass p-1.5 rounded-lg text-center border-green-500/30 bg-green-500/5 text-green-400"><p class="text-tiny font-black uppercase">בפנים</p><p class="font-black">${arrivedList.reduce((a,b)=>a+Number(b.pax),0)}</p></div>
                </div>

                ${state.isAdding ? renderForm() : `
                    <div class="flex gap-1">
                        <button onclick="updateState({isAdding: true})" class="flex-[2] btn-amber py-2.5 rounded-xl font-black uppercase shadow-lg">+ הוספת הזמנה</button>
                    </div>

                    ${state.venueId === 'q_gallery' ? `<button onclick="window.location.href='floorplan.html'" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-white flex items-center justify-center gap-2 shadow-lg"><i data-lucide="map"></i> OPEN SEATING MAP</button>` : ''}

                    <div class="flex justify-center py-1">
                        <button onclick="exportToWhatsApp()" class="bg-green-600 text-white px-8 py-2 rounded-full font-black text-tiny flex items-center gap-2 shadow-xl uppercase">
                            ייצוא לווצאפ <i data-lucide="share-2" size="14"></i>
                        </button>
                    </div>

                    <div class="glass rounded-xl overflow-hidden border border-white/5 shadow-xl">
                        <div class="bg-white/5 p-2 text-tiny font-black uppercase tracking-widest text-slate-400 text-center">רשימת הזמנות</div>
                        ${['table', 'bar', 'free'].map(type => {
                            const gList = pendingList.filter(r => r.type === type);
                            return gList.length ? `<div><div class="group-header uppercase">${type==='table'?'שולחנות':type==='bar'?'בר':'חינם'}</div>${gList.map(r => renderRow(r)).join('')}</div>` : '';
                        }).join('')}
                    </div>
                `}
            `;
        }

        // פונקציות עזר (Export, WhatsApp, וכו')...
        function exportToWhatsApp() {
            const list = state.reservations.filter(r => r.status === 'active' && r.venueId === state.venueId && r.eventDate === state.selectedDate);
            let text = `*הזמנות ${state.venueId.toUpperCase()} - ${state.selectedDate}*\n\n`;
            list.forEach(r => { text += `• ${r.name} (${r.pax}) - ${r.tableNumber || 'לא שובץ'}\n`; });
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // לוגיקת Render כללית...
        function render() {
            const root = document.getElementById('app');
            if (!state.role) { /* Login HTML */ return; }
            if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-4"><h2 class="text-lg font-black text-amber-500 uppercase">בחר מועדון</h2><div class="grid grid-cols-1 gap-3 w-full max-w-xs"><div onclick="updateState({venueId: 'q_gallery'})" class="glass p-6 rounded-2xl text-center text-xl font-black uppercase border-white/10">Q-GALLERY</div><div onclick="updateState({venueId: 'shalvata'})" class="glass p-6 rounded-2xl text-center text-xl font-black uppercase border-white/10 opacity-50">SHALVATA</div></div></div>`;
                return;
            }
            if (!state.isDateConfirmed) { /* Date Selection HTML */ return; }
            
            const venue = state.venueId === 'q_gallery' ? {name:'Q-GALLERY'} : {name:'SHALVATA'};
            const allList = state.reservations.filter(r => r.status === 'active' && r.venueId === state.venueId && r.eventDate === state.selectedDate);

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden">
                    <header class="bg-slate-950 p-2 border-b border-white/5 flex justify-between items-center shadow-lg">
                        <div class="font-black italic text-base uppercase text-amber-500 pr-2">${venue.name}</div>
                        <button onclick="updateState({venueId: null, isDateConfirmed: false})" class="text-amber-500 font-black text-tiny border border-amber-500/50 px-3 py-1.5 rounded-lg bg-amber-500/5 uppercase">בית</button>
                    </header>
                    <main class="flex-1 overflow-y-auto p-2 bg-slate-950/50 space-y-3">
                        ${renderDashboard(allList)}
                    </main>
                </div>`;
            lucide.createIcons();
        }

        db.collection('reservations').onSnapshot(snap => {
            updateState({ reservations: snap.docs.map(d => ({id: d.id, ...d.data()})) });
        });
        auth.onAuthStateChanged(user => { if(!user) auth.signInAnonymously(); });
    </script>
</body>
</html>
