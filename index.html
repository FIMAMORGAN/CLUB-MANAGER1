<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubPro V16.4 - Unified WhatsApp Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .arrived { border-right: 4px solid #22c55e !important; background: rgba(34, 197, 94, 0.05) !important; }
        .day-card { border-bottom: 2px solid rgba(245, 158, 11, 0.3); margin-bottom: 2rem; padding-bottom: 1rem; }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 4px solid #f59e0b; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const config = {
            firebase: {
                apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
                authDomain: "clubpro-system.firebaseapp.com",
                projectId: "clubpro-system",
                storageBucket: "clubpro-system.firebasestorage.app",
                messagingSenderId: "825897406218",
                appId: "1:825897406218:web:a660e48a120361247934f3"
            }
        };

        firebase.initializeApp(config.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["יום ראשון", "יום שני", "יום שלישי", "יום רביעי", "יום חמישי", "יום שישי", "יום שבת"];
        const todayStr = new Date().toISOString().split('T')[0];

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            reservations: [], isAdding: false, editingId: null, showSummary: false,
            selectedDate: '', 
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '', eventDate: todayStr }
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        function getDayName(dateStr) {
            const d = new Date(dateStr);
            return daysHebrew[d.getDay()];
        }

        async function login(val) {
            const clean = val.trim();
            if (clean.toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                localStorage.setItem('club_phone', 'ADMIN');
            } else if (clean.length >= 10) {
                const userDoc = await db.collection('users').doc(clean).get();
                let name = userDoc.exists ? userDoc.data().name : prompt("שם יחצן חדש:");
                if (name) {
                    if (!userDoc.exists) await db.collection('users').doc(clean).set({ name, phone: clean });
                    updateState({ role: 'promoter', userName: name, phone: clean });
                    localStorage.setItem('club_role', 'promoter');
                    localStorage.setItem('club_name', name);
                    localStorage.setItem('club_phone', clean);
                }
            }
        }

        async function saveBooking(e) {
            e.preventDefault();
            const dateToSave = state.formData.eventDate || state.selectedDate || todayStr;
            const paxNum = Number(state.formData.pax);
            let min = state.formData.manualPrice || (state.formData.type === 'free' ? 0 : paxNum * 300);
            const data = {
                name: state.formData.clientName, phone: state.formData.clientPhone,
                type: state.formData.type, pax: paxNum, eventDate: dateToSave,
                minOrder: Number(min), notes: state.formData.notes || "",
                promoterId: state.phone, promoterName: state.userName, status: 'active',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (state.editingId) await db.collection('reservations').doc(state.editingId).update(data);
            else { data.arrived = false; data.actualRevenue = 0; await db.collection('reservations').add(data); }
            updateState({ isAdding: false, editingId: null, formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '', eventDate: todayStr } });
        }

        function sendWhatsAppToClient(id) {
            const res = state.reservations.find(r => r.id === id);
            if (!res) return;
            const text = `שלום ${res.name}, הזמנתך מאושרת ל ${res.pax} אנשים לשעה 22:30 בנחלת בנימין 66 - ARIA TLV. מחכים לכם!`;
            const phone = res.phone.replace(/\D/g,'').replace(/^0/, '972');
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }

        function exportDailyList(date, dayList) {
            const dayName = getDayName(date);
            let text = `*רשימת הזמנות - ${dayName} ${date}*\n`;
            text += `--------------------------\n\n`;

            const tables = dayList.filter(r => r.type === 'table');
            const bars = dayList.filter(r => r.type === 'bar');
            const frees = dayList.filter(r => r.type === 'free');

            if (tables.length > 0) {
                text += `*🏠 שולחנות:*\n`;
                tables.forEach((r, i) => {
                    text += `${i + 1}. *${r.name}* | אנשים: ${r.pax} | מינימום: ₪${r.minOrder} | יחצן: ${r.promoterName}\n`;
                    if(r.notes) text += `   📝 הערה: ${r.notes}\n`;
                });
                text += `\n`;
            }

            if (bars.length > 0) {
                text += `*🍸 בר:*\n`;
                bars.forEach((r, i) => {
                    text += `${i + 1}. *${r.name}* | אנשים: ${r.pax} | מינימום: ₪${r.minOrder} | יחצן: ${r.promoterName}\n`;
                    if(r.notes) text += `   📝 הערה: ${r.notes}\n`;
                });
                text += `\n`;
            }

            if (frees.length > 0) {
                text += `*🎟️ כניסות חינם:*\n`;
                frees.forEach((r, i) => {
                    text += `${i + 1}. *${r.name}* | אנשים: ${r.pax} | יחצן: ${r.promoterName}\n`;
                });
                text += `\n`;
            }

            const totalPax = dayList.reduce((sum, r) => sum + Number(r.pax || 0), 0);
            text += `--------------------------\n`;
            text += `*סה"כ קהל צפוי: ${totalPax}*`;

            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4 text-center"><div class="w-full max-w-md glass p-10 rounded-[2rem] border border-white/10 text-white"><h2 class="text-3xl font-black mb-8 italic uppercase tracking-widest text-white">Login</h2><input id="login-input" type="text" placeholder="קוד או טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-center text-white text-xl outline-none"><button onclick="login(document.getElementById('login-input').value)" class="w-full btn-amber py-4 rounded-xl uppercase font-black shadow-xl">כניסה</button></div></div>`;
                return;
            }

            let list = state.reservations.filter(r => r.status === 'active');
            if (state.selectedDate) {
                list = list.filter(r => r.eventDate === state.selectedDate);
            } else {
                list = list.filter(r => r.eventDate >= todayStr);
            }
            if (state.role !== 'admin') list = list.filter(r => r.promoterId === state.phone);
            list = list.sort((a,b) => a.eventDate.localeCompare(b.eventDate));

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden">
                    <header class="bg-slate-950 p-4 border-b border-white/5 flex justify-between items-center text-white">
                        <div class="font-black italic text-xl uppercase tracking-tighter">CLUB<span class="text-amber-500">PRO</span></div>
                        <button onclick="localStorage.clear(); location.reload();" class="text-slate-500"><i data-lucide="log-out" size="18"></i></button>
                    </header>
                    <div class="bg-slate-900 p-3 border-b border-white/5 flex items-center justify-between px-4">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-amber-500 font-black uppercase">לצפייה בהזמנות עבר</span>
                            <input type="date" value="${state.selectedDate}" onchange="updateState({selectedDate: this.value})" class="bg-white/5 border border-white/10 rounded-xl p-2 text-white text-xs outline-none font-bold">
                        </div>
                        ${state.selectedDate ? '<button onclick="updateState({selectedDate: \'\'})" class="text-[10px] font-black text-blue-400">הצג הכל</button>' : ''}
                    </div>
                    <main class="flex-1 overflow-y-auto p-4 bg-slate-950/50">
                        ${state.showSummary ? renderSummary(list) : (state.isAdding ? renderForm() : (state.role === 'admin' ? renderAdmin(list) : renderPromoter(list)))}
                    </main>
                </div>
            `;
            lucide.createIcons();
        }

        function renderAdmin(list) {
            const dates = [...new Set(list.map(r => r.eventDate))].sort();
            return `
                <div class="space-y-4">
                    <div class="flex justify-between gap-2 text-white">
                        <button onclick="updateState({showSummary: true})" class="flex-1 bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase">סיכום עמלות</button>
                        <button onclick="updateState({isAdding: true})" class="flex-1 btn-amber py-3 rounded-xl text-[10px] font-black uppercase">הזמנה חדשה</button>
                    </div>
                    ${dates.map(date => {
                        const dayList = list.filter(r => r.eventDate === date);
                        const dayStats = { tables: 0, bar: 0 };
                        dayList.forEach(r => { 
                            if(r.type === 'table') dayStats.tables += Number(r.pax);
                            if(r.type === 'bar') dayStats.bar += Number(r.pax);
                        });
                        return `
                            <div class="day-card">
                                <div class="flex justify-between items-center mb-2">
                                    <h3 class="text-amber-500 font-black text-lg">${getDayName(date)} - ${date}</h3>
                                    <button onclick="exportDailyList('${date}', state.reservations.filter(r => r.eventDate === '${date}' && r.status === 'active'))" class="bg-green-600 text-white text-[10px] px-3 py-1 rounded-full font-black flex items-center gap-1">ייצוא רשימה <i data-lucide="share-2" size="10"></i></button>
                                </div>
                                <div class="grid grid-cols-2 gap-2 mb-4">
                                    <div class="glass p-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 font-black">כמות אנשים בשולחנות</p><p class="text-lg font-black text-white">${dayStats.tables}</p></div>
                                    <div class="glass p-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 font-black">כמות אנשים בבר</p><p class="text-lg font-black text-white">${dayStats.bar}</p></div>
                                </div>
                                <div class="glass rounded-2xl overflow-hidden border border-white/5">
                                    ${renderGroup('Tables', 'table', dayList)}
                                    ${renderGroup('Bar', 'bar', dayList)}
                                    ${renderGroup('Free Entry', 'free', dayList)}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderGroup(title, type, dayList) {
            const gList = dayList.filter(r => r.type === type);
            if (gList.length === 0) return '';
            return `
                <div class="p-2 border-b border-white/5">
                    <div class="group-header p-2 mb-2">
                        <span class="font-black text-amber-500 text-[10px] uppercase">${title}</span>
                    </div>
                    ${gList.map(r => renderRow(r, state.role === 'admin')).join('')}
                </div>
            `;
        }

        function renderRow(res, isAdmin) {
            return `
                <div class="flex items-center justify-between p-3 border-b border-white/5 ${res.arrived ? 'bg-green-500/5 arrived' : ''}">
                    <div class="flex items-center gap-3">
                        ${isAdmin ? `<input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-4 h-4 rounded accent-green-500">` : ''}
                        <div class="text-right">
                            <p class="font-bold text-white text-xs font-black">${res.name} (${res.pax}) <span class="text-[8px] text-amber-500 uppercase font-black">[${res.promoterName}]</span></p>
                            <p class="text-[9px] text-slate-400 font-bold italic">מינימום: ₪${res.minOrder}</p>
                            ${res.notes ? `<p class="text-[10px] text-white font-bold bg-white/5 p-1 rounded mt-1 border-r-2 border-amber-500">📝 ${res.notes}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        ${isAdmin ? `<input type="number" placeholder="Z" value="${res.actualRevenue || ''}" onchange="db.collection('reservations').doc('${res.id}').update({actualRevenue: Number(this.value)})" class="w-12 bg-black border border-white/10 rounded p-1 text-center text-green-400 text-[10px] font-bold outline-none text-white">` : ''}
                        <button onclick="sendWhatsAppToClient('${res.id}')" class="text-green-500 p-1 hover:bg-green-500/10 rounded"><i data-lucide="message-circle" size="14"></i></button>
                        <button onclick="startEdit('${res.id}')" class="text-amber-500 p-1 hover:bg-amber-500/10 rounded"><i data-lucide="edit-3" size="14"></i></button>
                        <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1 hover:bg-red-500/10 rounded"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                </div>`;
        }

        function startEdit(id) {
            const res = state.reservations.find(r => r.id === id);
            if (!res) return;
            updateState({
                editingId: id, isAdding: true,
                formData: { clientName: res.name, clientPhone: res.phone, type: res.type, pax: res.pax, manualPrice: res.minOrder, notes: res.notes || '', eventDate: res.eventDate }
            });
        }

        function renderForm() {
            const dateDisplay = state.formData.eventDate || state.selectedDate || todayStr;
            return `
                <div class="glass p-6 rounded-2xl space-y-4 border border-white/5 text-right text-white">
                    <h2 class="text-amber-500 font-black text-center">${state.editingId ? 'עריכת הזמנה' : 'הזמנה חדשה'}</h2>
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] text-amber-500 font-black">תאריך הזמנה: ${getDayName(dateDisplay)} (${dateDisplay})</span>
                        <input type="date" value="${dateDisplay}" onchange="state.formData.eventDate = this.value; render();" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white outline-none font-bold text-right">
                    </div>
                    <input placeholder="שם לקוח" value="${state.formData.clientName}" oninput="state.formData.clientName = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-right outline-none font-bold">
                    <input placeholder="טלפון" type="tel" value="${state.formData.clientPhone}" oninput="state.formData.clientPhone = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-left text-white outline-none font-bold" dir="ltr">
                    <div class="flex gap-1">${['table','bar','free'].map(t => `<button onclick="state.formData.type='${t}'; render();" class="flex-1 py-2 rounded-lg border text-[10px] font-black uppercase ${state.formData.type===t?'bg-amber-500 text-black border-amber-500':'bg-white/5 text-slate-400 border-white/10'}">${t}</button>`).join('')}</div>
                    <div class="grid grid-cols-2 gap-2 text-right">
                        <div><label class="text-[10px] text-slate-500 font-black">PAX</label><input type="number" value="${state.formData.pax}" oninput="state.formData.pax=this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-center font-bold"></div>
                        <div><label class="text-[10px] text-amber-500 font-black">Min ₪</label><input type="number" value="${state.formData.manualPrice || (state.formData.pax*300)}" oninput="state.formData.manualPrice=this.value" class="w-full bg-amber-500/10 border border-amber-500/20 rounded-lg p-3 text-amber-500 text-center font-black"></div>
                    </div>
                    <textarea placeholder="הערות..." oninput="state.formData.notes = this.value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white text-right h-16 font-bold text-white">${state.formData.notes || ''}</textarea>
                    <div class="flex justify-between items-center pt-2 font-black"><button onclick="updateState({isAdding: false, editingId: null})" class="text-slate-500 uppercase text-xs font-black">ביטול</button><button onclick="saveBooking(event)" class="btn-amber px-10 py-3 rounded-lg shadow-xl uppercase font-black">אשר ושמור</button></div>
                </div>`;
        }

        function renderSummary(list) {
            const summary = {}; list.forEach(r => { const p = r.promoterName || 'Admin'; if (!summary[p]) summary[p] = { count: 0, z: 0 }; summary[p].count++; summary[p].z += Number(r.actualRevenue || 0); });
            let totalComm = 0;
            const tableRows = Object.entries(summary).map(([name, data]) => {
                const comm = (data.z * 0.1).toFixed(0); totalComm += Number(comm);
                return `<tr><td class="p-4 font-black text-right">${name}</td><td class="p-4 text-white text-right">${data.count}</td><td class="p-4 font-black text-green-400 text-right">₪${data.z}</td><td class="p-4 font-black text-amber-500 text-right">₪${comm}</td></tr>`;
            }).join('');
            return `<div class="max-w-4xl mx-auto space-y-6 text-white"><div class="flex justify-between items-center"><button onclick="updateState({showSummary: false})" class="bg-red-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">חזור</button><h2 class="text-xl font-black text-amber-500 uppercase">עמלות 10%</h2></div><div class="glass rounded-2xl overflow-hidden border border-white/10"><table class="w-full text-sm text-white"><thead class="bg-white/5 text-[10px] uppercase font-black text-slate-400 text-right"><tr><th class="p-4">יחצן</th><th class="p-4">הזמנות</th><th class="p-4">Z</th><th class="p-4">עמלה</th></tr></thead><tbody class="divide-y divide-white/5">${tableRows}</tbody><tfoot class="bg-amber-500/10 font-black"><tr><td colspan="3" class="p-4 text-right">סה"כ לתשלום:</td><td class="p-4 text-amber-500 text-xl italic text-right">₪${totalComm}</td></tr></tfoot></table></div></div>`;
        }

        auth.onAuthStateChanged(user => {
            if (!user) { auth.signInAnonymously(); return; }
            db.collection('reservations').onSnapshot(snap => { updateState({ reservations: snap.docs.map(d => ({ id: d.id, ...d.data() })) }); });
        });
    </script>
</body>
</html>
