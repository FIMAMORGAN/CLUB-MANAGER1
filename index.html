<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubPro V17.5 - Compact & User MGMT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; text-align: right; font-size: 13px; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-amber { background-color: #f59e0b; color: #000; font-weight: 900; }
        .arrived { border-right: 3px solid #22c55e !important; background: rgba(34, 197, 94, 0.05) !important; }
        .venue-card { transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(30, 41, 59, 0.4); }
        .group-header { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); border-right: 2px solid #f59e0b; font-size: 10px; padding: 4px 8px; }
        input, button, select, textarea { font-size: 13px !important; }
        .text-tiny { font-size: 10px !important; }
        .text-small { font-size: 11px !important; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const config = {
            firebase: {
                apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
                authDomain: "clubpro-system.firebaseapp.com",
                projectId: "clubpro-system",
                storageBucket: "clubpro-system.firebasestorage.app",
                messagingSenderId: "825897406218",
                appId: "1:825897406218:web:a660e48a120361247934f3"
            }
        };

        firebase.initializeApp(config.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const daysHebrew = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
        const todayStr = new Date().toISOString().split('T')[0];
        const venues = [
            { id: 'shalvata', name: 'Shalvata' },
            { id: 'q_gallery', name: 'Q-GALLERY' },
            { id: 'ruki_vverh', name: 'РУКИ ВВЕРХ' }
        ];

        let state = {
            role: localStorage.getItem('club_role') || null,
            userName: localStorage.getItem('club_name') || '',
            phone: localStorage.getItem('club_phone') || '',
            venueId: null, selectedDate: '', users: [],
            reservations: [], isAdding: false, editingId: null, showSummary: false, showUsers: false,
            formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '' }
        };

        function updateState(newData) { state = { ...state, ...newData }; render(); }

        async function login(val) {
            const clean = val.trim();
            if (clean.toLowerCase() === 'res') {
                updateState({ role: 'admin', userName: 'Admin', phone: 'ADMIN' });
                localStorage.setItem('club_role', 'admin');
                localStorage.setItem('club_phone', 'ADMIN');
                return;
            }
            if (clean.length >= 10) {
                const userDoc = await db.collection('users').doc(clean).get();
                if (userDoc.exists) {
                    const d = userDoc.data();
                    updateState({ role: 'promoter', userName: d.name, phone: clean });
                    localStorage.setItem('club_role', 'promoter');
                    localStorage.setItem('club_name', d.name);
                    localStorage.setItem('club_phone', clean);
                } else {
                    const name = prompt("שם יחצן חדש:");
                    if (name) {
                        await db.collection('users').doc(clean).set({ name, phone: clean });
                        updateState({ role: 'promoter', userName: name, phone: clean });
                        localStorage.setItem('club_role', 'promoter');
                        localStorage.setItem('club_name', name);
                        localStorage.setItem('club_phone', clean);
                    }
                }
            }
        }

        async function saveBooking(e) {
            e.preventDefault();
            const paxNum = Number(state.formData.pax);
            let min = state.formData.manualPrice || (state.formData.type === 'free' ? 0 : paxNum * 300);
            const data = {
                venueId: state.venueId, name: state.formData.clientName, phone: state.formData.clientPhone,
                type: state.formData.type, pax: paxNum, eventDate: state.selectedDate,
                minOrder: Number(min), notes: state.formData.notes || "",
                promoterId: state.phone, promoterName: state.userName, status: 'active',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (state.editingId) await db.collection('reservations').doc(state.editingId).update(data);
            else { data.arrived = false; data.actualRevenue = 0; await db.collection('reservations').add(data); }
            updateState({ isAdding: false, editingId: null, formData: { type: 'table', pax: '', clientName: '', clientPhone: '', manualPrice: null, notes: '' } });
        }

        function exportDailyList(date, dayList) {
            const vName = venues.find(v => v.id === state.venueId).name;
            const dName = daysHebrew[new Date(date).getDay()];
            let text = `*${vName.toUpperCase()} - רשימת הזמנות יום ${dName} ${date}*\n`;
            text += `--------------------------\n\n`;
            ['table', 'bar', 'free'].forEach(type => {
                const filtered = dayList.filter(r => r.type === type);
                if (filtered.length > 0) {
                    text += `*${type === 'table' ? '🏠 שולחנות' : type === 'bar' ? '🍸 בר' : '🎟️ כניסות חינם'}:*\n`;
                    filtered.forEach((r, i) => {
                        text += `${i + 1}. *${r.name.trim()}* | PAX: ${r.pax} | Min: ₪${r.minOrder} | יחצן: ${r.promoterName}\n`;
                        if(r.notes) text += `   📝 ${r.notes}\n`;
                    });
                    text += `\n`;
                }
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.role) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-4"><div class="w-full max-w-xs glass p-8 rounded-3xl border border-white/10 text-center"><h2 class="text-xl font-black mb-6 uppercase tracking-widest text-white italic">ClubPro Login</h2><input id="login-input" type="text" placeholder="קוד / טלפון" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-4 text-center text-white outline-none font-bold"><button onclick="login(document.getElementById('login-input').value)" class="w-full btn-amber py-3 rounded-xl uppercase font-black">כניסה</button></div></div>`;
                return;
            }
            if (!state.venueId) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-4"><h2 class="text-lg font-black text-amber-500 uppercase">בחר מקום:</h2><div class="grid grid-cols-1 gap-3 w-full max-w-xs">${venues.map(v => `<div onclick="updateState({venueId: '${v.id}'})" class="venue-card p-5 rounded-xl text-center text-lg font-black text-white uppercase shadow-lg">${v.name}</div>`).join('')}</div><button onclick="localStorage.clear(); location.reload();" class="text-slate-500 font-bold uppercase mt-4 underline text-tiny">התנתק</button></div>`;
                return;
            }
            if (!state.selectedDate) {
                root.innerHTML = `<div class="h-screen p-6 flex flex-col items-center justify-center space-y-6 text-white"><button onclick="updateState({venueId: null})" class="text-amber-500 font-black text-xs flex items-center gap-2 border border-amber-500/30 px-4 py-2 rounded-full uppercase tracking-widest"><i data-lucide="arrow-right" size="14"></i> חזרה לדף הבית</button><h2 class="text-lg font-black uppercase">תאריך הזמנה:</h2><div class="glass p-6 rounded-3xl w-full max-w-xs text-center"><input type="date" value="${todayStr}" onchange="updateState({selectedDate: this.value})" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white text-xl outline-none font-black text-center shadow-inner"></div></div>`;
                lucide.createIcons();
                return;
            }

            const venue = venues.find(v => v.id === state.venueId);
            let list = state.reservations.filter(r => r.status === 'active' && r.venueId === state.venueId && r.eventDate === state.selectedDate);
            if (state.role !== 'admin') list = list.filter(r => r.promoterId === state.phone);

            root.innerHTML = `
                <div class="flex flex-col h-screen overflow-hidden text-right text-white">
                    <header class="bg-slate-950 p-2 border-b border-white/5 flex justify-between items-center shadow-lg">
                        <div class="font-black italic text-sm uppercase tracking-tighter text-amber-500 pr-2">${venue.name}</div>
                        <button onclick="updateState({venueId: null, selectedDate: '', isAdding: false, showSummary: false, showUsers: false})" class="text-amber-500 font-black text-tiny border border-amber-500/50 px-3 py-1 rounded-lg bg-amber-500/5 uppercase tracking-widest">חזרה לדף הבית</button>
                    </header>
                    <div class="bg-slate-900 p-2 border-b border-white/5 flex items-center justify-between px-3">
                        <input type="date" value="${state.selectedDate}" onchange="updateState({selectedDate: this.value})" class="bg-white/10 border border-white/20 rounded p-1 text-white text-[11px] outline-none font-black">
                        <div class="text-tiny font-black uppercase bg-white/10 px-2 py-0.5 rounded border border-white/5">יום ${daysHebrew[new Date(state.selectedDate).getDay()]}</div>
                    </div>
                    <main class="flex-1 overflow-y-auto p-2 bg-slate-950/50">
                        ${state.showUsers ? renderUsersMGMT() : (state.showSummary ? renderSummary(list) : (state.isAdding ? renderForm() : (state.role === 'admin' ? renderAdmin(list) : renderPromoter(list))))}
                    </main>
                </div>
            `;
            lucide.createIcons();
        }

        function renderAdmin(list) {
            const stats = { t: 0, b: 0, z: 0 };
            list.forEach(r => { if(r.type==='table') stats.t+=Number(r.pax); if(r.type==='bar') stats.b+=Number(r.pax); stats.z+=Number(r.actualRevenue); });
            return `
                <div class="space-y-2">
                    <div class="flex gap-1.5">
                        <button onclick="updateState({showUsers: true})" class="flex-1 bg-slate-800 py-2.5 rounded-xl text-tiny font-black uppercase shadow-lg border border-white/10 tracking-widest">ניהול יחצנים</button>
                        <button onclick="updateState({showSummary: true})" class="flex-1 bg-blue-900/50 py-2.5 rounded-xl text-tiny font-black uppercase shadow-lg border border-blue-500/30">סיכום עמלות</button>
                        <button onclick="updateState({isAdding: true})" class="flex-1 btn-amber py-2.5 rounded-xl text-tiny font-black uppercase shadow-lg">הזמנה חדשה</button>
                    </div>
                    <div class="grid grid-cols-3 gap-1.5">
                        <div class="glass p-1.5 rounded-xl text-center"><p class="text-tiny text-slate-500 font-black">PAX TABLES</p><p class="text-sm font-black">${stats.t}</p></div>
                        <div class="glass p-1.5 rounded-xl text-center"><p class="text-tiny text-slate-500 font-black">PAX BAR</p><p class="text-sm font-black">${stats.b}</p></div>
                        <div class="glass p-1.5 rounded-xl text-center border-green-500/30 border"><p class="text-tiny text-green-500 font-black">TOTAL Z</p><p class="text-sm font-black text-green-400">₪${stats.z}</p></div>
                    </div>
                    <div class="flex justify-center"><button onclick="exportDailyList(state.selectedDate, state.reservations.filter(r => r.eventDate === state.selectedDate && r.venueId === state.venueId && r.status === 'active'))" class="bg-green-600/20 text-green-400 border border-green-500/30 px-6 py-1.5 rounded-full font-black text-tiny flex items-center gap-2 shadow-lg tracking-widest">ייצוא לווצאפ <i data-lucide="share-2" size="10"></i></button></div>
                    <div class="glass rounded-xl overflow-hidden border border-white/5 shadow-xl">
                        ${['table', 'bar', 'free'].map(type => {
                            const gList = list.filter(r => r.type === type);
                            if(gList.length === 0) return '';
                            return `<div class="border-b border-white/5"><div class="group-header font-black text-amber-500 uppercase tracking-widest">${type}</div>${gList.map(r => renderRow(r, true)).join('')}</div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        function renderUsersMGMT() {
            return `
                <div class="space-y-4">
                    <div class="flex justify-between items-center"><button onclick="updateState({showUsers: false})" class="text-tiny font-black uppercase text-slate-400">< חזרה</button><h2 class="text-sm font-black text-amber-500 uppercase tracking-widest">ניהול יחצנים</h2></div>
                    <div class="glass p-4 rounded-xl space-y-2">
                        <p class="text-tiny font-black text-slate-400 uppercase">הוספת יחצן חדש:</p>
                        <div class="flex gap-2">
                            <input id="new-u-name" placeholder="שם יחצן" class="flex-1 bg-white/5 border border-white/10 rounded p-2 text-white outline-none">
                            <input id="new-u-phone" placeholder="טלפון" type="tel" class="flex-1 bg-white/5 border border-white/10 rounded p-2 text-white outline-none">
                            <button onclick="addUserManually()" class="bg-amber-500 text-black px-4 rounded font-black">+</button>
                        </div>
                    </div>
                    <div class="glass rounded-xl overflow-hidden divide-y divide-white/5">
                        <div class="p-2 font-black text-tiny text-slate-500 uppercase bg-white/5">רשימת יחצנים פעילים:</div>
                        ${state.users.map(u => `
                            <div class="flex justify-between items-center p-3">
                                <div><p class="font-black text-xs">${u.name}</p><p class="text-tiny text-slate-400">${u.id}</p></div>
                                <button onclick="deleteUser('${u.id}')" class="text-red-500 p-2"><i data-lucide="trash-2" size="14"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        async function addUserManually() {
            const name = document.getElementById('new-u-name').value;
            const phone = document.getElementById('new-u-phone').value;
            if(!name || phone.length < 10) return alert("פרטים לא תקינים");
            await db.collection('users').doc(phone).set({ name, phone });
            document.getElementById('new-u-name').value = '';
            document.getElementById('new-u-phone').value = '';
        }

        async function deleteUser(id) {
            if(confirm('למחוק את היחצן?')) await db.collection('users').doc(id).delete();
        }

        function renderRow(res, isAdmin) {
            return `
                <div class="flex items-center justify-between p-2 border-b border-white/5 ${res.arrived ? 'bg-green-500/10 arrived' : ''}">
                    <div class="flex items-center gap-2">
                        ${isAdmin ? `<input type="checkbox" ${res.arrived?'checked':''} onchange="db.collection('reservations').doc('${res.id}').update({arrived: this.checked})" class="w-4 h-4 accent-green-500">` : ''}
                        <div class="text-right">
                            <p class="font-black text-xs text-white leading-tight">${res.name} (${res.pax}) <span class="text-tiny text-amber-500 uppercase ml-1 opacity-60">${res.promoterName}</span></p>
                            <p class="text-tiny text-slate-400 italic">₪${res.minOrder} | 05${res.phone.slice(-9)}</p>
                            ${res.notes ? `<p class="text-tiny text-white bg-white/5 p-1 rounded mt-1 border-r border-amber-500">📝 ${res.notes}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        ${isAdmin ? `<input type="number" value="${res.actualRevenue || ''}" onchange="db.collection('reservations').doc('${res.id}').update({actualRevenue: Number(this.value)})" class="w-10 bg-black border border-white/20 rounded p-1 text-center text-green-400 text-tiny font-black outline-none">` : ''}
                        <button onclick="sendWhatsAppToClient('${res.id}')" class="text-green-500 p-1"><i data-lucide="message-circle" size="18"></i></button>
                        <button onclick="updateState({editingId:'${res.id}', isAdding:true, formData:{clientName:'${res.name}', clientPhone:'${res.phone}', type:'${res.type}', pax:'${res.pax}', manualPrice:'${res.minOrder}', notes:'${res.notes || ''}'}})" class="text-amber-500 p-1"><i data-lucide="edit-3" size="18"></i></button>
                        <button onclick="if(confirm('למחוק?')) db.collection('reservations').doc('${res.id}').update({status:'deleted'})" class="text-red-500 p-1"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>`;
        }

        function renderPromoter(list) {
            return `<div class="space-y-3"><div class="flex justify-between items-center px-1"><h2 class="text-sm font-black italic uppercase tracking-tighter text-white">ההזמנות שלי</h2><button onclick="updateState({isAdding: true})" class="btn-amber px-4 py-2 rounded-xl text-tiny uppercase font-black shadow-lg">+ חדש</button></div><div class="space-y-2">${list.map(r => renderRow(r, false)).join('')}</div></div>`;
        }

        function renderForm() {
            return `<div class="glass p-4 rounded-2xl space-y-3 text-right"><h2 class="text-amber-500 font-black text-center text-sm uppercase">${state.editingId ? 'עריכת הזמנה' : 'הזמנה חדשה'}</h2><input placeholder="שם לקוח" value="${state.formData.clientName}" oninput="state.formData.clientName = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-white outline-none font-bold"><input placeholder="טלפון" type="tel" value="${state.formData.clientPhone}" oninput="state.formData.clientPhone = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-left text-white outline-none font-bold" dir="ltr"><div class="flex gap-1.5">${['table','bar','free'].map(t => `<button onclick="state.formData.type='${t}'; render();" class="flex-1 py-2 rounded-xl border-2 text-[10px] font-black uppercase tracking-widest transition-all ${state.formData.type===t?'bg-amber-500 text-black border-amber-500 shadow-md':'bg-white/5 text-slate-400 border-white/10'}">${t}</button>`).join('')}</div><div class="grid grid-cols-2 gap-2"><div><label class="text-tiny text-slate-500 font-black uppercase">PAX</label><input type="number" value="${state.formData.pax}" oninput="state.formData.pax=this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-white text-center font-black"></div><div><label class="text-tiny text-amber-500 font-black uppercase">Min ₪</label><input type="number" value="${state.formData.manualPrice || (state.formData.pax*300)}" oninput="state.formData.manualPrice=this.value" class="w-full bg-amber-500/10 border border-amber-500/20 rounded-xl p-2 text-amber-500 text-center font-black"></div></div><textarea placeholder="הערות..." oninput="state.formData.notes = this.value" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-white text-right h-12 font-bold">${state.formData.notes || ''}</textarea><div class="flex justify-between items-center pt-2"><button onclick="updateState({isAdding: false, editingId: null})" class="text-slate-500 font-black uppercase text-tiny">ביטול</button><button onclick="saveBooking(event)" class="btn-amber px-8 py-3 rounded-xl shadow-xl uppercase font-black text-xs">שמור</button></div></div>`;
        }

        function renderSummary(list) {
            const summary = {}; list.forEach(r => { const p = r.promoterName || 'Admin'; if (!summary[p]) summary[p] = { count: 0, z: 0 }; summary[p].count++; summary[p].z += Number(r.actualRevenue || 0); });
            let totalComm = 0;
            const tableRows = Object.entries(summary).map(([name, data]) => {
                const comm = (data.z * 0.1).toFixed(0); totalComm += Number(comm);
                return `<tr><td class="p-3 font-black text-xs">${name}</td><td class="p-3 text-center text-tiny">${data.count}</td><td class="p-3 font-black text-green-400 text-xs">₪${data.z}</td><td class="p-3 font-black text-amber-500 text-xs">₪${comm}</td></tr>`;
            }).join('');
            return `<div class="max-w-4xl mx-auto space-y-3"><div class="flex justify-between items-center"><button onclick="updateState({showSummary: false})" class="bg-red-700/50 text-white px-4 py-1.5 rounded-lg text-tiny font-black uppercase shadow-lg border border-red-500/30">חזור</button><h2 class="text-xs font-black text-amber-500 uppercase tracking-widest text-white italic">Sales Commissions (10%)</h2></div><div class="glass rounded-xl overflow-hidden border border-white/10 shadow-xl"><table class="w-full text-white"><thead class="bg-white/5 text-tiny uppercase font-black text-slate-400 text-right"><tr><th class="p-3">יחצן</th><th class="p-3 text-center">הזמנות</th><th class="p-3">Z סופי</th><th class="p-3">עמלה</th></tr></thead><tbody class="divide-y divide-white/5">${tableRows}</tbody><tfoot class="bg-amber-500/10 font-black"><tr><td colspan="3" class="p-3 text-right uppercase text-xs">סה"כ לתשלום:</td><td class="p-3 text-amber-500 text-sm italic text-right font-black font-black">₪${totalComm}</td></tr></tfoot></table></div></div>`;
        }

        auth.onAuthStateChanged(user => {
            if (!user) { auth.signInAnonymously(); return; }
            db.collection('reservations').onSnapshot(snap => { updateState({ reservations: snap.docs.map(d => ({ id: d.id, ...d.data() })) }); });
            db.collection('users').onSnapshot(snap => { updateState({ users: snap.docs.map(d => ({ id: d.id, ...d.data() })) }); });
        });
    </script>
</body>
</html>
