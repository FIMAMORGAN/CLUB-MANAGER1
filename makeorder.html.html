<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Access | CLUBPRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .gold-gradient { background: linear-gradient(to bottom right, #f59e0b, #9a3412); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .venue-select.active { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
        input, select { font-size: 14px !important; transition: all 0.2s; }
        input:focus { border-color: rgba(245, 158, 11, 0.5) !important; background: rgba(255,255,255,0.08) !important; }
        .section-label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: block; padding-right: 8px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-12">
    <div id="form-container" class="w-full max-w-lg space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-black italic gold-gradient tracking-tighter">CLUBPRO</h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.4em] font-light">The New Standard of Nightlife</p>
        </div>

        <div class="glass-card rounded-[3rem] p-6 md:p-10 shadow-2xl">
            <form id="orderForm" class="space-y-6">
                <div>
                    <span class="section-label">בחירת מועדון</span>
                    <div class="grid grid-cols-2 gap-3">
                        <div onclick="selectVenue('shalvata')" id="v-shalvata" class="venue-select glass-card p-4 rounded-2xl text-center cursor-pointer transition-all border border-white/5 active:scale-95">
                            <p class="font-bold text-sm">SHALVATA</p>
                        </div>
                        <div onclick="selectVenue('q_gallery')" id="v-q_gallery" class="venue-select glass-card p-4 rounded-2xl text-center cursor-pointer transition-all border border-white/5 active:scale-95">
                            <p class="font-bold text-sm">Q-GALLERY</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="section-label">שם מלא</label>
                        <input type="text" id="name" required placeholder="שם ושם משפחה" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="section-label">טלפון</label>
                        <input type="tel" id="phone" required placeholder="050-0000000" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-left" dir="ltr">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="section-label">תאריך לידה</label>
                        <input type="date" id="dob" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="section-label">עיר מגורים</label>
                        <input type="text" id="city" required placeholder="מאיפה אתה?" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="section-label">Instagram @</label>
                        <input type="text" id="instagram" placeholder="User_name" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-left" dir="ltr">
                    </div>
                    <div class="space-y-2">
                        <label class="section-label">מין</label>
                        <select id="gender" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none appearance-none">
                            <option value="male" class="bg-slate-900 text-white">זכר</option>
                            <option value="female" class="bg-slate-900 text-white">נקבה</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2 border-t border-white/5">
                    <div class="space-y-2">
                        <label class="section-label">תאריך הגעה</label>
                        <input type="date" id="eventDate" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="section-label">כמות אנשים</label>
                        <input type="number" id="pax" required placeholder="0" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-center font-black">
                    </div>
                </div>

                <button type="submit" class="w-full bg-amber-500 text-black font-black py-5 rounded-2xl shadow-2xl shadow-amber-500/20 active:scale-95 transition-all mt-4 uppercase text-sm tracking-widest">
                    שלח בקשת הזמנה
                </button>
            </form>
        </div>
    </div>

    <div id="success-screen" class="hidden text-center space-y-6">
        <div class="w-24 h-24 bg-green-500/20 rounded-full flex items-center justify-center mx-auto border border-green-500/30">
            <i data-lucide="check" class="text-green-500" size="48"></i>
        </div>
        <h2 class="text-3xl font-black italic gold-gradient">REQUEST SENT!</h2>
        <p class="text-slate-400 max-w-xs mx-auto">הבקשה שלך הועברה למנהל המועדון. ניצור איתך קשר בוואטסאפ לאישור סופי.</p>
        <button onclick="location.reload()" class="bg-white/5 px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest border border-white/10">חזרה</button>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let selectedVenueId = 'shalvata';
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('eventDate').min = today;
        document.getElementById('eventDate').value = today;

        function selectVenue(id) {
            selectedVenueId = id;
            document.querySelectorAll('.venue-select').forEach(el => el.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
        }
        selectVenue('shalvata');

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = 'מעבד...';

            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                dob: document.getElementById('dob').value,
                city: document.getElementById('city').value,
                instagram: document.getElementById('instagram').value,
                gender: document.getElementById('gender').value,
                venueId: selectedVenueId,
                eventDate: document.getElementById('eventDate').value,
                pax: Number(document.getElementById('pax').value),
                status: 'pending',
                promoterName: 'אתר',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('reservations').add(data);
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
            } catch (err) {
                alert('שגיאה בשליחה');
                btn.disabled = false; btn.innerText = 'שלח בקשת הזמנה';
            }
        };
        lucide.createIcons();
    </script>
</body>
</html>
