<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q-GALLERY Interactive Floor Plan - CLUBPRO V80</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* מפה גרפית נקייה */
        .map-wrapper { position: relative; width: 420px; height: 780px; transform: scale(0.9); transform-origin: center center; }
        .map-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .interactive-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* סגנון כפתור שולחן - שקוף עם אפקט לחיצה */
        .table-btn { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; transition: all 0.2s; transform: translate(-50%, -50%); border-radius: 4px; pointer-events: auto; text-transform: uppercase; border: 2px solid transparent; }
        
        /* מצבי שולחן צבעוניים */
        .status-free { background-color: rgba(30, 41, 59, 0.4); border-color: rgba(255,255,255,0.1); color: #94a3b8; }
        
        /* צבע תפוס נעים ומקצועי (סגול עמוק) */
        .status-booked { background-color: #6366f1; border-color: #a5b4fc; color: white; box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); }
        .status-arrived { background-color: #22c55e; border-color: #86efac; color: white; }
        .status-linked { background-color: #f97316; border-color: #fdba74; color: white; }
        
        /* סימון בחירה נוצץ */
        .selected-highlight { border: 3px solid #f59e0b !important; box-shadow: 0 0 25px #f59e0b; z-index: 50; transform: translate(-50%, -50%) scale(1.1); }
        
        /* כפתורי בקרה שקופים */
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* הגדרת גדלים מיוחדים לכל סוג ישיבה */
        .type-std { width: 48px; height: 42px; }
        .type-std-v { width: 42px; height: 78px; }
        .type-vip-main { width: 110px; height: 68px; border-radius: 8px; }
        .type-vip-rect { width: 46px; height: 72px; }
        .type-round-framed { width: 34px; height: 34px; border-radius: 50%; }
        .type-bar-rect { width: 175px; height: 55px; border-radius: 8px; pointer-events: none; }
        .type-bar-seat { width: 20px; height: 20px; border-radius: 50%; font-size: 8px; }

        #confirm-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100; }
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 right-0 z-50 p-4 flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <div class="flex gap-3 items-center">
                <button onclick="window.location.href='index.html?confirmed=true'" class="glass-panel p-3 rounded-2xl text-amber-500 shadow-xl"><i data-lucide="home"></i></button>
                <h1 class="font-black text-amber-500 italic text-xl tracking-tighter">Q-GALLERY</h1>
            </div>
            <div id="status-tag" class="glass-panel text-slate-400 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">מפת ישיבה חיה</div>
        </div>

        <div class="glass-panel p-3 rounded-2xl grid grid-cols-2 gap-3 text-[10px] leading-tight shadow-2xl">
            <div class="border-l border-white/10 pl-3">
                <p class="text-amber-500 font-bold mb-1.5 underline">גבוהים (עד 4 איש):</p>
                <p>T8, T9, T10, T11 | T15, T16</p>
            </div>
            <div class="pr-3">
                <p class="text-blue-400 font-bold mb-1.5 underline">ספות / ישיבה נמוכה:</p>
                <p>T1 (6), T2 (4), T3 (4)</p>
                <p>V13, V14, V15 (עד 5 איש)</p>
            </div>
        </div>
    </div>

    <div id="confirm-btn" class="hidden">
        <button onclick="confirmAssignment()" class="bg-amber-500 text-black font-black px-12 py-4 rounded-full shadow-2xl uppercase tracking-widest flex items-center gap-4 text-xs">
            <span>אשר שיוך (<span id="selected-count">0</span> שולחנות)</span>
            <i data-lucide="check-circle" size="18"></i>
        </button>
    </div>

    <div id="wrapper" class="map-wrapper">
        
        <svg class="map-bg" viewBox="0 0 420 780" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="780" rx="30" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
            
            <rect x="20" y="320" width="380" height="200" rx="15" fill="#131C31" stroke="rgba(255,255,255,0.03)" stroke-width="2"/>
            <text x="210" y="425" fill="#1E293B" font-size="24" font-weight="900" text-anchor="middle" transform="rotate(-90 210 425)">BAR AREA</small></text>
            
            <path d="M20 530 H 400" stroke="#f59e0b" stroke-width="3" stroke-dasharray="10 5" opacity="0.4"/>
            <text x="380" y="520" fill="#f59e0b" font-size="10" font-weight="900" text-anchor="end">GOLD VIP SECTIONS</text>
        </svg>

        <div id="interactive-map" class="interactive-layer">
            
            <div id="btn-T11" data-type="type-std" class="table-btn status-free" style="top: 21.5%; left: 14%;">T11</div>
            <div id="btn-T10" data-type="type-std" class="table-btn status-free" style="top: 21.5%; left: 26%;">T10</div>
            <div id="btn-T9" data-type="type-std" class="table-btn status-free" style="top: 21.5%; left: 38%;">T9</div>
            <div id="btn-T8" data-type="type-std" class="table-btn status-free" style="top: 21.5%; left: 50%;">T8</div>

            <div id="btn-T7" data-type="type-vip-main" class="table-btn status-free" style="top: 23%; left: 75.5%;">T7 VIP</div>
            <div id="btn-T1" data-type="type-std-v" class="table-btn status-free" style="top: 53%; left: 85.5%;">T1</div>
            <div id="btn-T2" data-type="type-std-v" class="table-btn status-free" style="top: 66.5%; left: 85.5%;">T2</div>
            <div id="btn-T3" data-type="type-std-v" class="table-btn status-free" style="top: 80%; left: 85.5%;">T3</div>

            <div id="btn-V13" data-type="type-round-framed" class="table-btn status-free" style="top: 59%; left: 7.5%;">V13</div>
            <div id="btn-V14" data-type="type-round-framed" class="table-btn status-free" style="top: 64%; left: 7.5%;">V14</div>
            <div id="btn-V15" data-type="type-round-framed" class="table-btn status-free" style="top: 69%; left: 7.5%;">V15</div>
            
            <div id="btn-T15" data-type="type-vip-rect" class="table-btn status-free" style="top: 55%; left: 26.8%;">T15</div>
            <div id="btn-T16" data-type="type-vip-rect" class="table-btn status-free" style="top: 64%; left: 26.8%;">T16</div>
            <div id="btn-T18" data-type="type-vip-rect" class="table-btn status-free" style="top: 73%; left: 26.8%;">T18</div>

            <div id="btn-T4" data-type="type-std" class="table-btn status-free" style="top: 55%; left: 60.5%;">T4</div>
            <div id="btn-T5" data-type="type-std" class="table-btn status-free" style="top: 65%; left: 60.5%;">T5</div>
            <div id="btn-T6" data-type="type-std" class="table-btn status-free" style="top: 75%; left: 60.5%;">T6</div>

            <div id="btn-BAR" class="table-btn type-bar-rect" style="top: 44.5%; left: 45.5%;">Q-BAR</div>
            
            <div id="btn-S11" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 26%;">S11</div>
            <div id="btn-S12" data-type="type-bar-seat" class="table-btn status-free" style="top: 43%; left: 26%;">S12</div>
            <div id="btn-S13" data-type="type-bar-seat" class="table-btn status-free" style="top: 46.5%; left: 26%;">S13</div>
            
            <div id="btn-S3" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 30%;">S3</div>
            <div id="btn-S4" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 34.5%;">S4</div>
            <div id="btn-S5" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 39%;">S5</div>
            <div id="btn-S6" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 43.5%;">S6</div>
            <div id="btn-S7" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 48%;">S7</div>
            <div id="btn-S8" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 52.5%;">S8</div>
            <div id="btn-S9" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 57%;">S9</div>
            <div id="btn-S10" data-type="type-bar-seat" class="table-btn status-free" style="top: 39.5%; left: 61.5%;">S10</div>
            
            <div id="btn-S1" data-type="type-bar-seat" class="table-btn status-free" style="top: 46.5%; left: 65%;">S1</div>
            <div id="btn-S2" data-type="type-bar-seat" class="table-btn status-free" style="top: 43%; left: 65%;">S2</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // הגדרות Firebase...
        const config = { apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI", authDomain: "clubpro-system.firebaseapp.com", projectId: "clubpro-system", storageBucket: "clubpro-system.firebasestorage.app", messagingSenderId: "825897406218", appId: "1:825897406218:web:a660e48a120361247934f3" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const assignToId = urlParams.get('assignTo');
        const selectedDate = urlParams.get('date') || new Date().toISOString().split('T')[0];
        let selectedTables = [];

        if(assignToId) document.getElementById('status-tag').innerHTML = "בחר שולחנות לשיוך";

        // אתחול גדלים לפי data-type
        document.querySelectorAll('.table-btn[data-type]').forEach(btn => {
            btn.classList.add(btn.getAttribute('data-type'));
        });

        // האזנה לתפוסים בזמן אמת לפי תאריך
        db.collection('reservations')
          .where('eventDate', '==', selectedDate)
          .where('status', '==', 'active')
          .onSnapshot(snap => {
            // איפוס
            document.querySelectorAll('.table-btn[data-type]').forEach(btn => {
                btn.className = `table-btn ${btn.getAttribute('data-type')} status-free`;
            });

            // רישום תפוסים
            snap.docs.forEach(doc => {
                const res = doc.data();
                if (res.tableNumber) {
                    res.tableNumber.split('-').forEach(tId => {
                        const btn = document.getElementById('btn-' + tId);
                        if (btn) {
                            btn.classList.remove('status-free');
                            if (res.arrived) btn.classList.add('status-arrived');
                            else if (res.tableNumber.includes('-')) btn.classList.add('status-linked');
                            else btn.classList.add('status-booked');
                        }
                    });
                }
            });
        });

        function toggleTable(id) {
            if (!assignToId) return;
            const btn = document.getElementById('btn-' + id);

            // חסימת שולחנות תפוסים להזמנות אחרות
            if (btn.classList.contains('status-booked') || btn.classList.contains('status-arrived') || btn.classList.contains('status-linked')) {
                if (!selectedTables.includes(id)) {
                    return alert("שולחן זה כבר תפוס להיום!");
                }
            }

            const idx = selectedTables.indexOf(id);
            if (idx > -1) {
                selectedTables.splice(idx, 1);
                btn.classList.remove('selected-highlight');
            } else {
                selectedTables.push(id);
                btn.classList.add('selected-highlight');
            }
            
            // הצגת כפתור האישור
            document.getElementById('confirm-btn').classList.toggle('hidden', selectedTables.length === 0);
            document.getElementById('selected-count').innerText = selectedTables.length;
        }

        async function confirmAssignment() {
            if(!assignToId || selectedTables.length === 0) return;
            // שיוך השולחנות (ממוינים בסדר עולה)
            await db.collection('reservations').doc(assignToId).update({
                tableNumber: selectedTables.sort().join('-')
            });
            // חזרה לאינדקס עם פרמטר כדי לאפס את בחירת המועדון
            window.location.href = `index.html?confirmed=true&date=${selectedDate}`;
        }
        lucide.createIcons();
    </script>
</body>
</html>
