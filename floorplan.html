<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q-GALLERY Floor Plan V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .map-container { position: relative; width: 1200px; height: 800px; background: #0f172a; border: 2px solid #1e293b; transform-origin: 0 0; }
        
        /* עיצוב שולחן */
        .table { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 10px; cursor: pointer; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
        }
        
        /* צבעים */
        .available { background: #1e293b; color: #94a3b8; }
        /* צבע שולחן תפוס חדש - סגול עמוק נעים */
        .occupied { background: #6366f1; color: white; border-color: #818cf8; box-shadow: 0 0 10px rgba(99, 102, 241, 0.4); }
        .selected { background: #f59e0b !important; color: black !important; border-color: white; transform: scale(1.1); z-index: 50; }

        /* מקרא */
        .legend-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* מרווחים מיוחדים בין שולחנות T8-T11 */
        .t-gap { margin-left: 15px; }
        
        /* עיצוב כיסאות בר */
        .bar-seat { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        .bar-gap { margin-left: 10px; } /* רווח מוגדל לבר */
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 right-0 z-50 p-3 flex flex-col gap-2">
        <div class="flex justify-between items-center">
            <button onclick="goBack()" class="bg-slate-800 p-2 rounded-full"><i data-lucide="arrow-right"></i></button>
            <h1 class="font-black text-amber-500 italic">Q-GALLERY FLOOR PLAN</h1>
            <div id="status-tag" class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold uppercase">צפייה בלבד</div>
        </div>

        <div class="legend-card p-3 rounded-xl grid grid-cols-2 gap-2 text-[10px] leading-tight shadow-2xl">
            <div class="border-r border-white/10 pr-2">
                <p class="text-amber-500 font-bold mb-1 underline">גבוהים (עד 4 איש):</p>
                <p>T8, T9, T10, T11 | T15, T16</p>
            </div>
            <div class="pl-2">
                <p class="text-blue-400 font-bold mb-1 underline">ספות / ישיבה נמוכה:</p>
                <p>T1 (6), T2 (4), T3 (4)</p>
                <p>V13, V14, V15 (עד 5 איש)</p>
            </div>
        </div>
    </div>

    <div id="viewport" class="w-screen h-screen overflow-hidden cursor-grab active:cursor-grabbing">
        <div id="map" class="map-container">
            </div>
    </div>

    <div id="action-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 hidden">
        <button onclick="confirmSelection()" class="bg-amber-500 text-black font-black px-10 py-4 rounded-2xl shadow-2xl uppercase tracking-widest">אישור ושיוך שולחן</button>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI",
            authDomain: "clubpro-system.firebaseapp.com",
            projectId: "clubpro-system",
            storageBucket: "clubpro-system.firebasestorage.app",
            messagingSenderId: "825897406218",
            appId: "1:825897406218:web:a660e48a120361247934f3"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const assignToId = params.get('assignTo');
        const selectedDate = params.get('date') || new Date().toISOString().split('T')[0];

        let selectedTable = null;
        let occupiedTables = [];

        if(assignToId) document.getElementById('status-tag').innerHTML = "בחר שולחן לשיוך";

        // יצירת שולחנות עם המרווחים החדשים
        function createTables() {
            const map = document.getElementById('map');
            map.innerHTML = '';

            // קבוצה T8-T11 עם רווחים
            for(let i=0; i<4; i++) {
                const id = `T${11-i}`;
                addTable(id, 400 + (i * 65), 200, 45, 45); // הוספנו 65 במקום 50 כדי ליצור רווח
            }

            // שאר השולחנות
            addTable('T15', 400, 300, 45, 45);
            addTable('T16', 465, 300, 45, 45);
            
            addTable('T1', 200, 100, 80, 50); // ספה גדולה
            addTable('T2', 300, 100, 60, 50);
            addTable('T3', 380, 100, 60, 50);

            addTable('V13', 100, 400, 60, 40);
            addTable('V14', 170, 400, 60, 40);
            addTable('V15', 240, 400, 60, 40);

            // בר עם מרווח מוגדל בין S11 ל-S10
            for(let i=1; i<=15; i++) {
                let xPos = 600 + (i * 25);
                if (i > 4) xPos += 15; // רווח מיוחד בבר שביקשת
                addTable(`S${i}`, xPos, 500, 20, 20, true);
            }
        }

        function addTable(id, x, y, w, h, isBar = false) {
            const div = document.createElement('div');
            div.id = `table-${id}`;
            div.className = `table ${isBar ? 'bar-seat' : 'available'}`;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.innerText = id;
            div.onclick = () => selectTable(id);
            document.getElementById('map').appendChild(div);
        }

        function selectTable(id) {
            if(!assignToId) return;
            if(occupiedTables.includes(id)) return alert('שולחן תפוס');
            
            if(selectedTable) document.getElementById(`table-${selectedTable}`).classList.remove('selected');
            selectedTable = id;
            document.getElementById(`table-${id}`).classList.add('selected');
            document.getElementById('action-bar').classList.remove('hidden');
        }

        async function confirmSelection() {
            if(!selectedTable || !assignToId) return;
            await db.collection('reservations').doc(assignToId).update({
                tableNumber: selectedTable
            });
            goBack();
        }

        function goBack() {
            window.location.href = `index.html?confirmed=true&date=${selectedDate}`;
        }

        // האזנה לתפוסים בזמן אמת
        db.collection('reservations')
          .where('eventDate', '==', selectedDate)
          .where('status', '==', 'active')
          .onSnapshot(snap => {
            occupiedTables = snap.docs.map(d => d.data().tableNumber).filter(t => t);
            renderOccupancy();
        });

        function renderOccupancy() {
            document.querySelectorAll('.table').forEach(el => {
                const id = el.id.replace('table-', '');
                el.classList.remove('occupied');
                if(occupiedTables.includes(id)) el.classList.add('occupied');
            });
        }

        createTables();
        lucide.createIcons();
    </script>
</body>
</html>
