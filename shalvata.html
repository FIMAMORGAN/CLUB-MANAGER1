    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .map-wrapper { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* המכולה הלבנה - הכל מוכנס פנימה עם Margin כדי למנוע חיתוך */
        .map-container { position: relative; width: 360px; height: 580px; background: #fff; border: 3px solid #000; overflow: visible; }

        /* ספות */
        .sofa { position: absolute; border: 1.5px solid #000; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: #dc2626; cursor: pointer; background: #fff; z-index: 10; }
        .sofa-h { width: 45px; height: 20px; }
        .sofa-v { width: 30px; height: 38px; }
        .sofa-100 { width: 35px; height: 45px; border-radius: 0 20px 20px 0; border-left: none; }

        /* שולחנות עגולים - כיסאות צמודים */
        .round-area { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .table-center { width: 18px; height: 18px; border: 1.5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #dc2626; background: #fff; z-index: 2; cursor: pointer; }
        .chair-dot { position: absolute; width: 7px; height: 7px; border: 1px solid #000; border-radius: 50%; background: #fff; }

        /* UPER BAR - מוקטן וממורכז */
        .bar-container { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); width: 200px; height: 75px; border: 2px solid #000; border-radius: 40px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .bar-inner { width: 150px; height: 28px; border: 1.5px solid #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; font-size: 11px; }
        .bar-chair { position: absolute; width: 10px; height: 12px; border: 1.5px solid #000; border-radius: 3px; background: #fff; }

        /* סטטוסים */
        .booked { background: #ef4444 !important; color: white !important; }
        .selected { background: #f59e0b !important; color: black !important; transform: scale(1.1); z-index: 50; }
        
        .header { position: fixed; top: 0; width: 100%; padding: 8px; display: flex; justify-content: space-between; z-index: 100; background: #000; color: #f59e0b; }
    </style>
</head>
<body>

<div id="save-panel" class="fixed bottom-10 left-0 right-0 hidden px-6 z-50">
    <button onclick="confirmS()" class="w-full bg-amber-500 text-black py-4 rounded-xl font-black uppercase shadow-2xl">אשר שיוך שולחן</button>
</div>

<script>
    const config = { apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI", authDomain: "clubpro-system.firebaseapp.com", projectId: "clubpro-system", storageBucket: "clubpro-system.firebasestorage.app", messagingSenderId: "825897406218", appId: "1:825897406218:web:a660e48a120361247934f3" };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const params = new URLSearchParams(window.location.search);
    const assignTo = params.get('assignTo');
    const date = params.get('date') || new Date().toISOString().split('T')[0];
    let selected = null;

    db.collection('reservations').where('eventDate', '==', date).where('venueId', '==', 'shalvata').where('status', '==', 'active')
      .onSnapshot(snap => {
        document.querySelectorAll('[id^="btn-"]').forEach(el => el.classList.remove('booked'));
        snap.docs.forEach(doc => {
            const t = doc.data().tableNumber;
            if(t) document.getElementById('btn-'+t)?.classList.add('booked');
        });
      });

    function selectT(id) {
        if(!assignTo) return;
        const el = document.getElementById('btn-'+id);
        if(el.classList.contains('booked')) return alert('תפוס!');
        if(selected) document.getElementById('btn-'+selected).classList.remove('selected');
        selected = id;
        el.classList.add('selected');
        document.getElementById('save-panel').classList.remove('hidden');
    }

    async function confirmS() {
        await db.collection('reservations').doc(assignTo).update({ tableNumber: selected });
        window.location.href = `index.html?confirmed=shalvata&date=${date}`;
    }
    lucide.createIcons();
</script>

</html>
