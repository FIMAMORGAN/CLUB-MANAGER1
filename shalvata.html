<!DOCTYPE html>
<html lang="he" dir="rtl">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHALVATA 1:1 MAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .map-wrapper { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #020617; }
        .map-container { position: relative; width: 450px; height: 650px; background: #fff; border-radius: 4px; border: 4px solid #000; }

        /* ספות היקפיות (שחור/לבן כמו בציור) */
        .sofa { position: absolute; border: 2px solid #000; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #dc2626; cursor: pointer; background: #fff; }
        .sofa-h { width: 55px; height: 25px; } /* אופקיות */
        .sofa-v { width: 35px; height: 45px; } /* אנכיות */
        .sofa-100 { width: 45px; height: 55px; border-radius: 0 25px 25px 0; border-left: none; } /* ספה 100 המעוגלת */

        /* שולחנות עגולים (10-50) */
        .round-area { position: absolute; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .table-center { width: 22px; height: 22px; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: #dc2626; background: #fff; z-index: 10; cursor: pointer; }
        .chair-dot { position: absolute; width: 8px; height: 8px; border: 1px solid #000; border-radius: 50%; background: #fff; }

        /* UPER BAR - פרופורציה מדויקת */
        .bar-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 260px; height: 100px; border: 2px solid #000; border-radius: 50px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .bar-inner { width: 200px; height: 40px; border: 2px solid #000; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; font-size: 14px; }
        .bar-chair { position: absolute; width: 12px; height: 14px; border: 2px solid #000; border-radius: 4px; background: #fff; }

        /* סטטוסים */
        .booked { background: #ef4444 !important; color: white !important; }
        .selected { background: #f59e0b !important; color: black !important; border-color: #000 !important; transform: scale(1.1); z-index: 50; }
        
        .header { position: fixed; top: 0; width: 100%; padding: 10px; display: flex; justify-content: space-between; z-index: 100; background: #000; color: #f59e0b; }
    </style>
</head>
<body>

<div class="header">

    <div class="text-center font-black italic uppercase">SHALVATA TABLE MENU</div>

</div>

        <div id="btn-130" class="sofa sofa-h" style="top: 20px; left: 90px;" onclick="selectT('130')">130</div>

        <div id="btn-170" class="sofa sofa-v" style="top: 310px; left: 20px;" onclick="selectT('170')">170</div>
        <div id="btn-180" class="sofa sofa-v" style="top: 420px; left: 20px;" onclick="selectT('180')">180</div>
        <div id="btn-190" class="sofa sofa-v" style="top: 530px; left: 20px;" onclick="selectT('190')">190</div>

        <div id="btn-210" class="sofa sofa-v" style="top: 90px; left: -45px;" onclick="selectT('210')">210</div>

        </div>
        <div class="round-area" style="top: 110px; left: 180px;">

            <div class="chair-dot" style="top: -10px; left: 20px;"></div><div class="chair-dot" style="bottom: -10px; left: 20px;"></div>

    </div>
</div>

<div id="save-panel" class="fixed bottom-10 left-0 right-0 hidden px-6 z-50">
    <button onclick="confirmS()" class="w-full bg-amber-500 text-black py-4 rounded-xl font-black uppercase shadow-2xl">אשר שיוך שולחן</button>
</div>

<script>
    const config = { apiKey: "AIzaSyD2y4clTGDYnZmmO8Gyg0bXqsyafF-a_GI", authDomain: "clubpro-system.firebaseapp.com", projectId: "clubpro-system", storageBucket: "clubpro-system.firebasestorage.app", messagingSenderId: "825897406218", appId: "1:825897406218:web:a660e48a120361247934f3" };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const params = new URLSearchParams(window.location.search);
    const assignTo = params.get('assignTo');
    const date = params.get('date') || new Date().toISOString().split('T')[0];
    let selected = null;

    db.collection('reservations').where('eventDate', '==', date).where('venueId', '==', 'shalvata').where('status', '==', 'active')
      .onSnapshot(snap => {
        document.querySelectorAll('[id^="btn-"]').forEach(el => el.classList.remove('booked'));
        snap.docs.forEach(doc => {
            const t = doc.data().tableNumber;
            if(t) document.getElementById('btn-'+t)?.classList.add('booked');
        });
      });

    function selectT(id) {
        if(!assignTo) return;
        const el = document.getElementById('btn-'+id);
        if(el.classList.contains('booked')) return alert('תפוס!');
        if(selected) document.getElementById('btn-'+selected).classList.remove('selected');
        selected = id;
        el.classList.add('selected');
        document.getElementById('save-panel').classList.remove('hidden');
    }

    async function confirmS() {
        await db.collection('reservations').doc(assignTo).update({ tableNumber: selected });
        window.location.href = `index.html?confirmed=shalvata&date=${date}`;
    }
    lucide.createIcons();
</script>
</body>
</html>
